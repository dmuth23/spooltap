# SpoolTap install config.
#
# Copy this file to `secrets.yaml` (same folder as your HA configuration.yaml)
# and fill in YOUR values. `secrets.yaml` is gitignored — your real hostnames,
# ids, and entity names never leave your machine. The shared SpoolTap package
# reads everything from here via `!secret`, so the package file itself stays
# free of any install-specific values.
#
# After editing this file: reload the YAML config (or restart HA) so !secret
# re-resolves, THEN tap "SpoolTap: Apply Config" on the dashboard so the new
# values take effect. See SETUP.md.

# --- Service endpoints: your Spoolman + Bambuddy add-on hostnames ---
# Find on each add-on's page → "Hostname". Keep the http:// and the port.
spooltap_spoolman_base:             "http://YOUR-spoolman-addon:7912"
spooltap_bambuddy_base:             "http://YOUR-bambuddy-addon:8000"

# --- Spoolman HA integration ---
# Settings → Devices & Services → Spoolman → ⋮ → copy the id from the page URL.
spooltap_spoolman_config_entry_id:  "PASTE_SPOOLMAN_CONFIG_ENTRY_ID"

# --- Printer ---
# spooltap_printer_id: your printer's id in Bambuddy (GET /api/v1/printers/).
spooltap_printer_id:                1
# spooltap_ams_prefix: the entity-id stem your AMS tray sensors share — the part
# BEFORE `left_tray_1` / `right_tray_1`. Dev Tools → States, search `tray_1`.
spooltap_ams_prefix:                "sensor.YOURPRINTER_ams_..._"
# spooltap_external_sensor: your external-spool sensor. Dev Tools → States, search `external`.
spooltap_external_sensor:           "sensor.YOURPRINTER_external_spool_external_spool"
# spooltap_print_status_sensor: your printer's print-status sensor (gates the
# "don't reconfigure mid-print" check). Dev Tools → States, search `print_status`.
spooltap_print_status_sensor:       "sensor.YOURPRINTER_print_status"
# spooltap_nozzle: nozzle diameter; profile setting_ids are per-nozzle.
spooltap_nozzle:                    "0.4"

# --- Notifications ---
# Your phone's notify service. Dev Tools → Actions, search `notify.mobile_app`.
spooltap_notify_target:             "notify.mobile_app_YOURPHONE"
