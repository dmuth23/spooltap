# =============================================================================
# Filament NFC — Phase 1: tag-registration tooling
# =============================================================================
# Foundation for phone-based (HA Companion, Android) NFC filament workflows.
# Lets you bind your own NFC tags to Spoolman spools and to the 8 AMS slots.
#
# DESIGN NOTES (hard-won — do not "simplify" these away):
#  * We store the HA tag_id in a DEDICATED Spoolman extra field `nfc_tag`.
#    Bambuddy OWNS the `tag` field (its own NFC UUIDs) and `active_tray`.
#    NEVER write `tag` or `active_tray` from here.
#  * Spoolman extra TEXT values are stored JSON-encoded (wrapped in quotes):
#    the string  abc  is stored as  "abc" . We must send '"' ~ value ~ '"'.
#    The Spoolman HA integration STRIPS those quotes when it exposes
#    sensor.spoolman_spool_<id>_extra_nfc_tag, so reads are already clean.
#  * Writes use read-modify-write (GET -> merge -> PATCH). Spoolman 0.23.1
#    merges extra per-key, but a future version could REPLACE the whole
#    object; RMW keeps Bambuddy's fields safe under either behavior.
#  * Every active spool carries materialized (empty-string) nfc_tag and
#    nfc_active_tray extras (batch 2026-06-12), so their sensors always
#    exist and bind/assign refresh VALUES with a cheap update_entity
#    coordinator poll (15s interval anyway) instead of a config-entry
#    reload. Per-action reloads caused the 2026-06-12 storm incident
#    (thousands of entity blips -> websocket floods -> bambu_lab MQTT
#    starvation -> set_filament timeouts). The reload survives only as a
#    brand-new-spool fallback; the nightly profile sync re-materializes
#    any spool added since the batch.
#  * input_number.nfc_target_spool_id holds the spool id to bind to —
#    set it from the dashboard, then run nfc_bind_spool. Avoids needing
#    templated service-call data from Lovelace tiles/buttons.
#  * TAG LIFECYCLE (user-defined, 2026-06-11):
#    - SLOT tags are (near-)permanent fixtures on ALL 8 AMS slots — they
#      stay bound even while a Bambu RFID spool occupies the slot (the NFC
#      flow is simply not used for Bambu spools; Bambuddy manages those).
#    - SPOOL tags are RECYCLED: when a spool empties, peel the tag and
#      re-bind it to a new spool. nfc_bind_spool clears the tag from every
#      other spool first (via the all-spools API, so archived spools whose
#      HA sensors are gone are covered too) — a recycled tag never matches
#      two spools.
#    - Cross-role guards: nfc_bind_spool refuses a tag already bound to an
#      AMS slot; nfc_bind_slot refuses a tag already bound to a spool. A
#      dual-role tag would make the scan dispatch ambiguous.
#    - Scanning slot tag -> spool tag is a DECLARATION OF PHYSICAL REALITY
#      ("this spool is going into this slot now") — do it while loading.
#
# Spoolman base URL + config-entry id are install-specific — they live in
# secrets.yaml (spooltap_spoolman_base, spooltap_spoolman_config_entry_id);
# the base is surfaced via the SpoolTap CONFIG helpers below.
# =============================================================================
#
# Phase A: assign-spool-to-tray
# ------------------------------
#  * Workflow: scan an AMS slot tag (sets input_text.nfc_pending_slot), then
#    scan a spool tag -> nfc_assign_spool_to_tray runs automatically.
#  * Mirrors nfc_tag with a DEDICATED extra field `nfc_active_tray` (also
#    NEVER touching Bambuddy's `active_tray`).
#  * Pushes the Spoolman filament's type/color/temps to the AMS tray via
#    bambu_lab.set_filament. tray_info_idx comes from the filament-level
#    Spoolman extra `nfc_tray_idx`: a custom Bambu Studio profile P-code
#    (e.g. P6705242 = "SUNLU PLA+ Gen 2") or an official GF catalog code
#    (e.g. GFL04 = "Overture PLA"). The printer then displays the real
#    vendor/product identity. P-codes are resolved from the user's Bambu
#    cloud library via Bambuddy (script.nfc_sync_filament_profiles); the
#    old material->Generic map (GFL99 etc.) survives ONLY as the
#    last-resort fallback for unmapped filaments.
#  * Nozzle temps priority: harvested profile range (filament extras
#    nfc_temp_min/nfc_temp_max) -> +/-10C around Spoolman's
#    settings_extruder_temp (a top-level int on filament, NOT under extra)
#    -> per-material input_number defaults below. These only gate the purge
#    preheat — actual print temps come from the slicer profile. Unknown
#    materials with no profile use the "default" pair and raise a
#    persistent_notification asking for review.
# =============================================================================

rest_command:
  spoolman_get_spool:
    url: "{{ states('input_text.spooltap_spoolman_base') }}/api/v1/spool/{{ spool_id }}"
    method: GET
  spoolman_patch_spool:
    url: "{{ states('input_text.spooltap_spoolman_base') }}/api/v1/spool/{{ spool_id }}"
    method: PATCH
    content_type: "application/json"
    payload: "{{ body }}"
  # Modify Spool (Phase B): name/material live on the FILAMENT record, which
  # may be SHARED by several spools — edits apply to all of them (the load
  # status lists the siblings so this is never a surprise).
  spoolman_patch_filament:
    url: "{{ states('input_text.spooltap_spoolman_base') }}/api/v1/filament/{{ filament_id }}"
    method: PATCH
    content_type: "application/json"
    payload: "{{ body }}"
  # One-off utility for creating new Spoolman extra fields (e.g.
  # nfc_active_tray for Phase A). Call once after deploy with
  # field_key + body: {"name": "...", "field_type": "text"}.
  spoolman_create_field:
    url: "{{ states('input_text.spooltap_spoolman_base') }}/api/v1/field/spool/{{ field_key }}"
    method: POST
    content_type: "application/json"
    payload: "{{ body }}"
  # Bambuddy's local "Spoolman spool <-> printer AMS slot" assignment table
  # (separate from Spoolman's own spool.location field, which stays
  # user-managed). Reachable from HA core at the addon's hostname, port 8000
  # (mirrors the Spoolman base-URL pattern above; the addon hostname is
  # install-specific — set in secrets.yaml as spooltap_bambuddy_base). No auth.
  bambuddy_get_slot_assignment:
    url: "{{ states('input_text.spooltap_bambuddy_base') }}/api/v1/spoolman/inventory/slot-assignments?printer_id={{ printer_id }}&ams_id={{ ams_id }}&tray_id={{ tray_id }}"
    method: GET
  # Full assignment table. Used for the target-slot occupant check because
  # the single-slot GET above validates ams_id <= 7 and so cannot query the
  # external spool (ams_id 255) — a Bambuddy API quirk; POST and /all both
  # handle 255 fine (live-verified 2026-06-12).
  bambuddy_get_all_assignments:
    url: "{{ states('input_text.spooltap_bambuddy_base') }}/api/v1/spoolman/inventory/slot-assignments/all"
    method: GET
  bambuddy_assign_slot:
    url: "{{ states('input_text.spooltap_bambuddy_base') }}/api/v1/spoolman/inventory/slot-assignments"
    method: POST
    content_type: "application/json"
    payload: "{{ body }}"
  bambuddy_unassign_spool:
    url: "{{ states('input_text.spooltap_bambuddy_base') }}/api/v1/spoolman/inventory/slot-assignments/{{ spool_id }}"
    method: DELETE
  # Phase B / archived-spool resolver: fetch ALL spools INCLUDING archived
  # (Spoolman's default GET hides archived). Searched client-side by nfc_tag
  # — used only on the exception path (a scanned tag that matched no active
  # spool), so the ~45 KB payload is acceptable.
  spoolman_get_all_spools:
    url: "{{ states('input_text.spooltap_spoolman_base') }}/api/v1/spool?allow_archived=true"
    method: GET
  # Full filament list (incl. extras) for the profile-sync matcher.
  spoolman_get_all_filaments:
    url: "{{ states('input_text.spooltap_spoolman_base') }}/api/v1/filament"
    method: GET
  # The user's custom Bambu Studio filament library: P-code -> profile name,
  # served by Bambuddy from the linked Bambu cloud account. This is the ONLY
  # queryable source of custom P-codes — the printer itself stores no
  # profile names (raw MQTT tray_id_name/tray_sub_brands are empty for
  # custom profiles; verified via integration diagnostics 2026-06-12).
  bambuddy_get_filament_id_map:
    url: "{{ states('input_text.spooltap_bambuddy_base') }}/api/v1/cloud/filament-id-map"
    method: GET
  # Per-nozzle cloud preset variants ({name '… @… 0.4 nozzle', setting_id}).
  # setting_id is what makes a custom P-code STICK on the printer.
  bambuddy_get_cloud_filaments:
    url: "{{ states('input_text.spooltap_bambuddy_base') }}/api/v1/cloud/filaments"
    method: GET
  # THE printer push (replaces bambu_lab.set_filament for assignments,
  # 2026-06-12 evening): Bambuddy's slot-configure carries setting_id — the
  # cloud preset id Bambu Studio itself sends. Without it the printer
  # accepts color/type but silently DROPS an uncached custom P-code,
  # leaving the tray profile-less ("Empty" in detail views and invisible
  # to the slicer's installed-filament list) — root cause of the
  # 2026-06-12 evening failures after the printer power-cycle flushed its
  # profile cache. GF catalog codes work with an empty setting_id.
  bambuddy_configure_slot:
    url: >-
      {{ states('input_text.spooltap_bambuddy_base') }}/api/v1/printers/{{ printer_id }}/slots/{{ ams_id }}/{{ tray_id }}/configure?tray_info_idx={{ tray_info_idx }}&tray_type={{ tray_type | urlencode }}&tray_sub_brands=&tray_color={{ tray_color }}&nozzle_temp_min={{ temp_min }}&nozzle_temp_max={{ temp_max }}&setting_id={{ setting_id }}
    method: POST

input_boolean:
  nfc_register_mode:
    name: NFC Bind Mode
    icon: mdi:nfc-tap

  # Per-category gates for the phone notifications pushed by
  # automation nfc_status_notify ("Notifications" dashboard view).
  # No `initial:` on purpose — state restores across restarts so user
  # choices stick. NOTE: they therefore start OFF when first created;
  # flip on the desired ones once after deploy.
  nfc_notify_scan:
    name: "Notify: Tag scanned (Bind Mode)"
    icon: mdi:nfc-search-variant
  nfc_notify_bind:
    name: "Notify: Tag bound (Spool/Slot)"
    icon: mdi:link-variant
  nfc_notify_slot_prompt:
    name: "Notify: Slot Tag scanned (Assign prompt)"
    icon: mdi:tray-alert
  nfc_notify_assign:
    name: "Notify: Spool assigned to Slot"
    icon: mdi:tray-arrow-down
  nfc_notify_weight:
    name: "Notify: Spool weight (from scan)"
    icon: mdi:scale
  nfc_notify_error:
    name: "Notify: Errors & refusals"
    icon: mdi:alert-circle
  nfc_notify_timeout:
    name: "Notify: Pending Scan timeout"
    icon: mdi:timer-off
  nfc_notify_other:
    name: "Notify: Everything else (system messages)"
    icon: mdi:message-cog
  nfc_notify_modify:
    name: "Notify: Modify Spool actions"
    icon: mdi:pencil

  # ── Layer 2: BB ↔ Spoolman reconciler ────────────────────────
  # Master kill switch. The poll/event/startup automations gate on
  # this; the MANUAL button bypasses it (explicit user intent).
  # NOTE: no `initial:` — HA restores last-known state across restarts
  # so user's off-preference is preserved. After first deploy, flip
  # on once via dashboard. Matches the nfc_notify_* pattern in this file.
  bb_reconciler_enabled:
    name: "BB Reconciler: enabled"
    icon: mdi:sync-circle
  # Opt-in phone notifications for SUCCESSFUL heal events. Conflicts
  # and cycle-level errors always notify via nfc_notify_error. This
  # boolean controls the silent-heal stream specifically (default off
  # per O7: "no log noise unless something needs attention").
  nfc_notify_reconcile:
    name: "Notify: BB Reconciler auto-heals"
    icon: mdi:auto-fix

input_text:
  # ── SpoolTap CONFIG (parameterization) ──────────────────────────────
  # Install-specific values live in secrets.yaml and are surfaced here so
  # rest_commands/templates can read them. `initial: !secret …` seeds each
  # from secrets.yaml. After editing secrets.yaml: reload the YAML config (or
  # restart HA) so !secret re-resolves, THEN run script.spooltap_apply_config
  # to push the new values into these helpers.
  spooltap_spoolman_base:
    name: "SpoolTap: Spoolman base URL"
    max: 255
    icon: mdi:cog
    initial: !secret spooltap_spoolman_base
  spooltap_bambuddy_base:
    name: "SpoolTap: Bambuddy base URL"
    max: 255
    icon: mdi:cog
    initial: !secret spooltap_bambuddy_base
  spooltap_ams_prefix:
    name: "SpoolTap: AMS tray-sensor prefix"
    max: 255
    icon: mdi:cog
    initial: !secret spooltap_ams_prefix
  spooltap_external_sensor:
    name: "SpoolTap: External-spool sensor"
    max: 255
    icon: mdi:cog
    initial: !secret spooltap_external_sensor
  spooltap_print_status_sensor:
    name: "SpoolTap: Print-status sensor"
    max: 255
    icon: mdi:cog
    initial: !secret spooltap_print_status_sensor
  spooltap_notify_target:
    name: "SpoolTap: Notify target"
    max: 255
    icon: mdi:cog
    initial: !secret spooltap_notify_target
  spooltap_nozzle:
    name: "SpoolTap: Nozzle diameter"
    max: 8
    icon: mdi:cog
    initial: !secret spooltap_nozzle
  # ────────────────────────────────────────────────────────────────────
  nfc_last_scanned:
    name: NFC Last Scanned Tag
    max: 255
    icon: mdi:nfc-variant
  nfc_register_status:
    name: NFC Status
    max: 255
    icon: mdi:information-outline
  nfc_pending_slot:
    name: NFC Pending Slot
    max: 255
    icon: mdi:tray-alert
  # Empty-slot assign queue. When the user taps a spool to a physically
  # EMPTY AMS slot, nfc_assign_spool_to_tray writes a deferred intent
  # here (slot|tag_uid|epoch) instead of hanging for 2 min waiting for
  # the AMS to detect filament. nfc_empty_slot_queue_watcher fires when
  # the tray loads and re-enters the assignment via Phase A dispatch.
  # Records phase has already run by queue-write time; this defers ONLY
  # the printer push to when there is something physically there to push to.
  nfc_queued_assign:
    name: NFC Queued Assignment
    max: 128
    icon: mdi:timer-sand
  # Storm dampener key for BB-reconciler SM_ONLY heals. Format:
  # "{ams}_{tray}_{spool_id}". When the SAME key triggers heals in
  # >=3 consecutive cycles, BB is evicting our re-push faster than we
  # can re-assert (e.g. printer keeps reporting state=10 on a slot
  # that's not actually loaded). After threshold the heal skips and
  # surfaces a ⚠ for manual intervention. Reset when the key changes.
  nfc_storm_key:
    name: BB Reconciler Storm Key
    max: 64
    icon: mdi:weather-lightning-rainy
  # Modify Spool (Phase B): editable filament name for the loaded spool.
  nfc_mod_name:
    name: "NFC Modify: Filament Name"
    max: 255
    icon: mdi:rename-box
  # Canonical loaded-spool helpers (D5 in Modify-redesign spec). Held
  # separately from the editable drafts above so the dashboard header can
  # bind to immutable record state (filled atomically by
  # nfc_load_spool_for_modify, cleared by nfc_unload_modify) without ever
  # tracking mid-edit drafts. sensor.nfc_modify_loaded_spool reads these and
  # exposes them as attributes; binary_sensor.nfc_modify_dirty diffs these
  # vs the draft helpers to drive the unified Save button.
  nfc_mod_loaded_name:
    name: "NFC Modify: Loaded Spool Name"
    max: 255
    icon: mdi:rename-box-outline
  nfc_mod_loaded_material:
    name: "NFC Modify: Loaded Spool Material"
    max: 64
    icon: mdi:texture-box
  nfc_mod_loaded_spool_id:
    name: "NFC Modify: Loaded Spool ID (canonical)"
    max: 16
    icon: mdi:identifier
  nfc_slot_left_1: { name: AMS Left 1 Tag, max: 255, icon: mdi:tray }
  nfc_slot_left_2: { name: AMS Left 2 Tag, max: 255, icon: mdi:tray }
  nfc_slot_left_3: { name: AMS Left 3 Tag, max: 255, icon: mdi:tray }
  nfc_slot_left_4: { name: AMS Left 4 Tag, max: 255, icon: mdi:tray }
  nfc_slot_right_1: { name: AMS Right 1 Tag, max: 255, icon: mdi:tray }
  nfc_slot_right_2: { name: AMS Right 2 Tag, max: 255, icon: mdi:tray }
  nfc_slot_right_3: { name: AMS Right 3 Tag, max: 255, icon: mdi:tray }
  nfc_slot_right_4: { name: AMS Right 4 Tag, max: 255, icon: mdi:tray }
  # 9th slot: the external spool feed. Bambuddy models it as
  # ams_id 255 / tray_id 0; the HA entity is install-specific
  # (secrets.yaml: spooltap_external_sensor).
  nfc_slot_external: { name: External Slot Tag, max: 255, icon: mdi:tray-arrow-up }

input_select:
  # --- Dashboard mode switcher ----------------------------------------
  # Drives the SpoolTap dashboard's Assign / Bind / Modify / Inventory
  # tabs (section visibility keys off this state). The dashboard's mode
  # buttons set it via input_select.select_option; automation
  # nfc_regmode_autooff_leaving_bind turns Registration Mode off whenever
  # the mode leaves "Bind". Defined here (not as a UI helper) so a fresh
  # install gets it automatically.
  spooltap_mode:
    name: SpoolTap Mode
    icon: mdi:nfc-variant
    options:
      - Assign
      - Bind
      - Modify
      - Inventory

  nfc_slot_select:
    name: AMS Slot to Bind
    icon: mdi:tray-arrow-down
    options:
      - AMS Left 1
      - AMS Left 2
      - AMS Left 3
      - AMS Left 4
      - AMS Right 1
      - AMS Right 2
      - AMS Right 3
      - AMS Right 4
      - External

  # --- Faceted spool picker (Bind-to-Spool section) -------------------
  # Options are rebuilt at runtime by script.nfc_rebuild_spool_filters via
  # input_select.set_options. NOTE: runtime options DO NOT survive an HA
  # restart (they revert to these YAML placeholders) — that's why automation
  # nfc_filter_rebuild also triggers on homeassistant start.
  nfc_filter_brand:
    name: "NFC Bind: Brand filter"
    icon: mdi:factory
    options: ["Any"]
  nfc_filter_type:
    name: "NFC Bind: Type filter"
    icon: mdi:texture
    options: ["Any"]
  nfc_spool_pick:
    name: "NFC Bind: Spool Picker"
    icon: mdi:format-list-bulleted
    options: ["Select…"]
  # Picker pool mode — cycled from a dashboard tile (tap = select_next):
  # Untagged (no nfc_tag yet, default) / All Active (tagged marked ✓ tagged) / Tagged.
  nfc_pool_mode:
    name: "NFC Bind: Pool filter"
    icon: mdi:filter-variant
    options: ["Untagged", "All Active", "Tagged"]

  # --- Modify Spool (Phase B) picker -----------------------------------
  # Separate facet set from the bind picker (different pool semantics and
  # lifecycle: bind clears after binding; modify stays on a spool while
  # several fields are edited). Pool = ALL active non-Bambu spools. Options
  # rebuilt at runtime (same restart caveat as the bind picker). Selecting a
  # Tag loads its spool directly; selecting from the Spool list loads on
  # pick. nfc_mod_material doubles as the editable Type value — "Unknown"
  # means "leave the type unchanged" on save.
  nfc_mod_tag:
    name: "NFC Modify: Tag Picker"
    icon: mdi:tag-search
    options: ["Select Spool Tag…"]
  nfc_mod_filter_brand:
    name: "NFC Modify: Brand filter"
    icon: mdi:factory
    options: ["Any"]
  nfc_mod_filter_type:
    name: "NFC Modify: Type filter"
    icon: mdi:texture
    options: ["Any"]
  nfc_mod_spool_pick:
    name: "NFC Modify: Spool Picker"
    icon: mdi:format-list-bulleted
    options: ["Select…"]
  nfc_mod_material:
    name: "NFC Modify: Material"
    icon: mdi:texture-box
    options: ["Unknown"]

input_number:
  # SpoolTap CONFIG — see the input_text CONFIG block. Printer id in Bambuddy.
  spooltap_printer_id:
    name: "SpoolTap: Printer ID (Bambuddy)"
    min: 1
    max: 255
    step: 1
    mode: box
    icon: mdi:cog
    initial: !secret spooltap_printer_id
  nfc_target_spool_id:
    name: "NFC Bind: Target Spool ID"
    icon: mdi:numeric
    min: 0
    max: 999
    step: 1
    mode: box

  # Phase B: spool weight management (scan a registered spool with no slot
  # pending). nfc_lookup_spool fills these from Spoolman; the dashboard's
  # Update Weight button runs nfc_update_remaining_weight to write it back.
  nfc_weight_spool_id:
    name: "NFC Modify: Loaded Spool ID"
    icon: mdi:identifier
    min: 0
    max: 9999
    step: 1
    mode: box
  nfc_weight_edit:
    name: "NFC Modify: Remaining weight (g)"
    icon: mdi:scale
    min: 0
    max: 10000
    step: 1
    mode: box
    unit_of_measurement: "g"
  # Modify Spool (Phase B) weigh-in mode: put the spool on a scale and enter
  # the GROSS weight (filament + empty spool); nfc_apply_weighin computes
  # remaining = gross - tare. Pre-filled on load with the EXPECTED gross so
  # the scale reading can be sanity-checked at a glance.
  nfc_mod_gross:
    name: "NFC Modify: Gross weight (incl. empty spool, g)"
    icon: mdi:scale-balance
    min: 0
    max: 10000
    step: 1
    mode: box
    unit_of_measurement: "g"

  # Canonical loaded-spool numeric helpers (D5 in Modify-redesign spec).
  # Paired with the input_text canonical helpers above; together they hold
  # the immutable "what the server says is loaded" snapshot for the header
  # sensor + dirty diff. nfc_load_spool_for_modify writes these in the same
  # step as the editable drafts; nfc_unload_modify zeros them.
  nfc_mod_loaded_remaining:
    name: "NFC Modify: Loaded Remaining (canonical, g)"
    icon: mdi:scale
    min: 0
    max: 10000
    step: 1
    mode: box
    unit_of_measurement: "g"
  nfc_mod_loaded_tare:
    name: "NFC Modify: Loaded Tare (canonical, g)"
    icon: mdi:scale-bathroom
    min: 0
    max: 5000
    step: 1
    mode: box
    unit_of_measurement: "g"

  # Per-material nozzle temp defaults, used by nfc_assign_spool_to_tray when
  # a spool's Spoolman record has no settings_extruder_temp set. Seeded from
  # Bambu's "Generic <material>" filament catalog ranges. Editable as new
  # materials enter the inventory.
  nfc_temp_min_pla: { name: "NFC Temp Min (PLA)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 190 }
  nfc_temp_max_pla: { name: "NFC Temp Max (PLA)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 240 }
  nfc_temp_min_pla_plus: { name: "NFC Temp Min (PLA+)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 190 }
  nfc_temp_max_pla_plus: { name: "NFC Temp Max (PLA+)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 240 }
  nfc_temp_min_pla_cf: { name: "NFC Temp Min (PLA-CF)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 190 }
  nfc_temp_max_pla_cf: { name: "NFC Temp Max (PLA-CF)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 240 }
  nfc_temp_min_petg: { name: "NFC Temp Min (PETG)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 220 }
  nfc_temp_max_petg: { name: "NFC Temp Max (PETG)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 270 }
  nfc_temp_min_petg_cf: { name: "NFC Temp Min (PETG-CF)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 240 }
  nfc_temp_max_petg_cf: { name: "NFC Temp Max (PETG-CF)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 270 }
  nfc_temp_min_pa: { name: "NFC Temp Min (PA)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 240 }
  nfc_temp_max_pa: { name: "NFC Temp Max (PA)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 280 }
  nfc_temp_min_default: { name: "NFC Temp Min (Default/Unknown)", icon: mdi:thermometer-low, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 190 }
  nfc_temp_max_default: { name: "NFC Temp Max (Default/Unknown)", icon: mdi:thermometer-high, min: 160, max: 300, step: 1, mode: box, unit_of_measurement: "°C", initial: 240 }
  # ── Layer 2: BB ↔ Spoolman reconciler counters ────────────────
  # Implemented as input_number (not counter:) because the counter
  # domain has no YAML reload service — would force a full HA restart
  # on every package edit. input_number is reload-friendly with
  # identical semantics (initial: 0, integer steps).
  # fail_count: incremented each cycle that fails to fetch BB; reset
  # on success. Triggers a ⚠ at >=3 consecutive failures.
  bb_reconciler_fail_count:
    name: BB Reconciler Fail Count
    icon: mdi:counter
    min: 0
    max: 999
    step: 1
    initial: 0
    mode: box
  # storm_count: incremented when the SAME SM_ONLY heal key recurs
  # cycle-after-cycle (BB keeps evicting the same row right after we
  # re-push). At >=3 the heal skips and surfaces a ⚠.
  bb_reconciler_storm_count:
    name: BB Reconciler Storm Count
    icon: mdi:weather-lightning
    min: 0
    max: 999
    step: 1
    initial: 0
    mode: box

# Manual reconcile-now button on the SpoolTap Inventory tab. Fires
# an immediate cycle without waiting for the next 5-min poll. Goes
# straight to bb_reconciler_cycle, bypassing the master switch (it's
# user intent — they want it to run).
input_button:
  nfc_reconcile_now:
    name: "BB Reconciler: run now"
    icon: mdi:sync

template:
  # Success/failure chip for the assignment pipeline: Working while the
  # assign script runs, then Success/Failed from the verified status text
  # (the ✓/⚠ markers written by the push read-back), Cancelled after
  # nfc_cancel_assignment, Idle otherwise.
  - sensor:
      - name: NFC Assign Result   # entity_id = slugify(name); MUST match unique_id for the dashboard chip
        unique_id: nfc_assign_result
        icon: >-
          {{ {'Working': 'mdi:progress-clock',
              'Queued': 'mdi:timer-sand',
              'Awaiting Spool Tag': 'mdi:nfc-search-variant',
              'Success': 'mdi:check-circle',
              'Failed': 'mdi:alert-circle',
              'Cancelled': 'mdi:cancel'}.get(this.state | default('Idle'), 'mdi:sleep') }}
        state: >-
          {% if is_state('script.nfc_assign_spool_to_tray', 'on') %}
            Working
          {% elif states('input_text.nfc_queued_assign') not in ['', 'unknown', 'unavailable'] %}
            Queued
          {% elif states('input_text.nfc_pending_slot') not in ['', 'unknown', 'unavailable'] %}
            Awaiting Spool Tag
          {% else %}
            {% set msg = states('input_text.nfc_register_status') %}
            {% if '✓' in msg %}Success
            {% elif '⚠' in msg %}Failed
            {% elif msg.startswith('Assignment cancelled') %}Cancelled
            {% elif msg.startswith('NOT bound') or msg.startswith('Unrecognized')
                  or 'ARCHIVED' in msg or 'skipping' in msg or 'timed out' in msg %}Failed
            {% else %}Idle
            {% endif %}
          {% endif %}
        attributes:
          detail: "{{ states('input_text.nfc_register_status') }}"
  # Profile Sync workbench feed: updated by the nfc_profile_sync_report
  # event the sync script fires on every run. State = unmatched count;
  # the unmatched attribute carries per-filament candidate codes for the
  # copy-paste card on the dashboard. Trigger-based -> survives restarts.
  - trigger:
      - trigger: event
        event_type: nfc_profile_sync_report
    sensor:
      - name: NFC Profile Sync Report   # entity_id = slugify(name); MUST match unique_id (dashboard reads it)
        unique_id: nfc_profile_sync_report
        icon: >-
          {{ 'mdi:cloud-check' if (trigger.event.data.unmatched | length) == 0 else 'mdi:cloud-question' }}
        state: "{{ trigger.event.data.unmatched | length }}"
        attributes:
          unmatched: "{{ trigger.event.data.unmatched }}"
          mapped: "{{ trigger.event.data.mapped }}"
          sid_filled: "{{ trigger.event.data.sid_filled }}"
          last_sync: "{{ now().isoformat() }}"
  # BB Reconciler heal log — trigger-based, captures every successful
  # heal event the script fires. Renders a rolling 5-entry list as an
  # attribute the Inventory-tab Mushroom card pulls from. State is the
  # total heal count since last HA restart (trigger-based sensors
  # don't persist counters across restarts but DO persist last-state).
  # Event payload schema:
  #   direction: "BB->SM" | "SM->BB" | "BB->SM (conflict, BB wins)"
  #   slot: e.g. "right_2" / "external"
  #   spool_id: int — the spool now bound to the slot
  #   spool_name: friendly filament name for the card
  #   old_spool_id: int — only on conflict events (the displaced spool)
  #   timestamp: ISO string
  - trigger:
      - trigger: event
        event_type: nfc_reconciler_heal
    sensor:
      - name: NFC Recent Heals   # entity_id = slugify(name); MUST match unique_id (dashboard heal log reads it)
        unique_id: nfc_recent_heals
        icon: mdi:auto-fix
        state: >-
          {{ (this.state | int(0)) + 1 if this is defined else 1 }}
        attributes:
          # Prepend the new event to the existing list, trim to last 5.
          # default([], true): state_attr returns None (not undefined) when
          # the attribute hasn't been set yet — the single-arg form of
          # default only replaces undefined, so prev was None and [new]+None
          # silently raised TypeError. The `true` second arg makes default
          # ALSO replace None. Live-bug 2026-06-15: state counted 9 events
          # but `recent` attr stayed None because every render hit TypeError.
          recent: >-
            {%- set new = {
              'direction': trigger.event.data.direction,
              'slot': trigger.event.data.slot,
              'spool_id': trigger.event.data.spool_id,
              'spool_name': trigger.event.data.spool_name | default(''),
              'old_spool_id': trigger.event.data.old_spool_id | default(0),
              'timestamp': trigger.event.data.timestamp
            } -%}
            {%- set raw = state_attr(this.entity_id, 'recent') -%}
            {%- set prev = raw if raw is iterable and raw is not string else [] -%}
            {{ ([new] + prev)[:10] }}
          last_heal_at: "{{ trigger.event.data.timestamp }}"
  - sensor:
      # Resolves the last-scanned tag to a Spoolman spool id by searching all
      # extra_nfc_tag sensors. State = spool id (e.g. "13"), or "" if no match.
      - name: NFC Scanned Spool   # entity_id = slugify(name); keep aligned with unique_id
        unique_id: nfc_scanned_spool
        icon: mdi:magnify
        state: >
          {% set tag = states('input_text.nfc_last_scanned') %}
          {% if tag in ['', 'unknown', 'unavailable'] %}
          {% else %}
            {% set ns = namespace(found='') %}
            {% for s in states.sensor
                 | selectattr('entity_id', 'search', '_extra_nfc_tag$')
                 | selectattr('state', 'eq', tag) %}
              {% set ns.found = s.object_id.split('_')[2] %}
            {% endfor %}
            {{ ns.found }}
          {% endif %}
        attributes:
          matched: >
            {% set tag = states('input_text.nfc_last_scanned') %}
            {{ tag not in ['', 'unknown', 'unavailable']
               and (states.sensor
                    | selectattr('entity_id', 'search', '_extra_nfc_tag$')
                    | selectattr('state', 'eq', tag) | list | count) > 0 }}

      # "Tag in hand": resolves the last-scanned tag to its HA tag-registry
      # NAME and classifies its role, so the Bind-to-Spool dashboard card can
      # confirm the right physical tag is in hand BEFORE binding.
      # role: none | slot | spool | unbound | unregistered
      - name: NFC Scanned Tag Name
        unique_id: nfc_scanned_tag_name
        icon: mdi:tag-text
        state: >-
          {%- set t = states('input_text.nfc_last_scanned') -%}
          {%- if t in ['', 'unknown', 'unavailable'] -%}
            (none)
          {%- else -%}
            {{ states.tag | selectattr('attributes.tag_id', 'eq', t)
               | map(attribute='name') | first | default('(unregistered tag)') }}
          {%- endif -%}
        attributes:
          role: >-
            {%- set t = states('input_text.nfc_last_scanned') -%}
            {%- if t in ['', 'unknown', 'unavailable'] -%}
              none
            {%- else -%}
              {%- set ns = namespace(slot='') -%}
              {%- for s in ['left_1','left_2','left_3','left_4','right_1','right_2','right_3','right_4'] -%}
                {%- if states('input_text.nfc_slot_' ~ s) == t -%}{%- set ns.slot = s -%}{%- endif -%}
              {%- endfor -%}
              {%- if ns.slot != '' -%}
                slot
              {%- else -%}
                {%- set sp = states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                     | selectattr('attributes.extra_nfc_tag', 'defined')
                     | selectattr('attributes.extra_nfc_tag', 'eq', t)
                     | map(attribute='attributes.id') | first | default(0) -%}
                {%- if sp -%}
                  spool
                {%- elif states.tag | selectattr('attributes.tag_id', 'eq', t) | list | count > 0 -%}
                  unbound
                {%- else -%}
                  unregistered
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
          slot: >-
            {%- set t = states('input_text.nfc_last_scanned') -%}
            {%- set ns = namespace(slot='') -%}
            {%- if t not in ['', 'unknown', 'unavailable'] -%}
              {%- for s in ['left_1','left_2','left_3','left_4','right_1','right_2','right_3','right_4'] -%}
                {%- if states('input_text.nfc_slot_' ~ s) == t -%}{%- set ns.slot = s -%}{%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.slot }}
          spool_id: >-
            {%- set t = states('input_text.nfc_last_scanned') -%}
            {%- if t in ['', 'unknown', 'unavailable'] -%}
              0
            {%- else -%}
              {{ states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | selectattr('attributes.extra_nfc_tag', 'defined')
                 | selectattr('attributes.extra_nfc_tag', 'eq', t)
                 | map(attribute='attributes.id') | first | default(0) }}
            {%- endif -%}
          spool_label: >-
            {%- set t = states('input_text.nfc_last_scanned') -%}
            {%- set sid = 0 if t in ['', 'unknown', 'unavailable'] else
                 states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | selectattr('attributes.extra_nfc_tag', 'defined')
                 | selectattr('attributes.extra_nfc_tag', 'eq', t)
                 | map(attribute='attributes.id') | first | default(0) -%}
            {%- if sid -%}
              {{ state_attr('sensor.spoolman_spool_' ~ sid, 'filament_vendor_name') }} {{ state_attr('sensor.spoolman_spool_' ~ sid, 'filament_name') }} ({{ state_attr('sensor.spoolman_spool_' ~ sid, 'filament_material') }})
            {%- endif -%}

  # ── Modify-redesign D5 ──────────────────────────────────────────
  # Modify-tab header sensor. State is the canonical loaded spool id (as a
  # string) when a spool is loaded, else ''. Attributes summarize the 5
  # canonical helpers for the dashboard header — they collapse to blank/0
  # when nfc_weight_spool_id is 0, so the header physically cannot show a
  # previous spool's data through an unload. All reads use defaulted
  # accessors per §11 float-trap notes / reference_in_states_broken.md
  # (bare `| float` throws on `unavailable`; bare `| int` returns 0 silently
  # — every read uses an explicit `| default(...)` or `| float(0)` /
  # `| int(0)` guard).
  - sensor:
      - name: NFC Modify Loaded Spool
        unique_id: nfc_modify_loaded_spool
        icon: >-
          {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
          {{ 'mdi:tray-full' if sid > 0 else 'mdi:tray' }}
        state: >-
          {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
          {%- if sid > 0 -%}
            {{ states('input_text.nfc_mod_loaded_spool_id') | default('') }}
          {%- else -%}
            {{ '' }}
          {%- endif -%}
        attributes:
          loaded: >-
            {{ (states('input_number.nfc_weight_spool_id') | float(0)) > 0 }}
          spool_id: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid > 0 -%}
              {{ states('input_text.nfc_mod_loaded_spool_id') | default('') }}
            {%- else -%}
              {{ '' }}
            {%- endif -%}
          name: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid > 0 -%}
              {{ states('input_text.nfc_mod_loaded_name') | default('') }}
            {%- else -%}
              {{ '' }}
            {%- endif -%}
          material: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid > 0 -%}
              {{ states('input_text.nfc_mod_loaded_material') | default('') }}
            {%- else -%}
              {{ '' }}
            {%- endif -%}
          remaining: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid > 0 -%}
              {{ states('input_number.nfc_mod_loaded_remaining') | float(0) | round(1) }}
            {%- else -%}
              {{ 0 }}
            {%- endif -%}
          tare: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid > 0 -%}
              {{ states('input_number.nfc_mod_loaded_tare') | float(0) | round(0) | int }}
            {%- else -%}
              {{ 0 }}
            {%- endif -%}

  # ── Modify-redesign D3 ──────────────────────────────────────────
  # Dirty sensor — drives the unified Save button's enabled-vs-greyed state.
  # 'on' when ANY of the 4 draft helpers differs from its canonical pair.
  # 'off' when all 4 match OR when no spool is loaded
  # (nfc_weight_spool_id == 0). Every state() call is guarded; weights are
  # rounded to 0g granularity before compare (matches the step:1 helper
  # config — avoids float noise re-triggering dirty after a clean reload).
  # Material defaults to "Unknown" on draft side to match canonical sentinel.
  - binary_sensor:
      - name: NFC Modify Dirty
        unique_id: nfc_modify_dirty
        icon: >-
          {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
          {%- if sid <= 0 -%}
            mdi:circle-outline
          {%- else -%}
            {%- set d_name = states('input_text.nfc_mod_name') | default('') | trim -%}
            {%- set c_name = states('input_text.nfc_mod_loaded_name') | default('') | trim -%}
            {%- set d_mat = states('input_select.nfc_mod_material') | default('Unknown') -%}
            {%- set c_mat_raw = states('input_text.nfc_mod_loaded_material') | default('') -%}
            {%- set c_mat = c_mat_raw if c_mat_raw != '' else 'Unknown' -%}
            {%- set d_net = states('input_number.nfc_weight_edit') | float(0) | round(0) | int -%}
            {%- set c_net = states('input_number.nfc_mod_loaded_remaining') | float(0) | round(0) | int -%}
            {%- set d_gross = states('input_number.nfc_mod_gross') | float(0) | round(0) | int -%}
            {%- set c_tare = states('input_number.nfc_mod_loaded_tare') | float(0) | round(0) | int -%}
            {%- set c_gross = c_net + c_tare -%}
            {%- if d_name != c_name or d_mat != c_mat or d_net != c_net or d_gross != c_gross -%}
              mdi:pencil-circle
            {%- else -%}
              mdi:check-circle-outline
            {%- endif -%}
          {%- endif -%}
        state: >-
          {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
          {%- if sid <= 0 -%}
            off
          {%- else -%}
            {%- set d_name = states('input_text.nfc_mod_name') | default('') | trim -%}
            {%- set c_name = states('input_text.nfc_mod_loaded_name') | default('') | trim -%}
            {%- set d_mat = states('input_select.nfc_mod_material') | default('Unknown') -%}
            {%- set c_mat_raw = states('input_text.nfc_mod_loaded_material') | default('') -%}
            {%- set c_mat = c_mat_raw if c_mat_raw != '' else 'Unknown' -%}
            {%- set d_net = states('input_number.nfc_weight_edit') | float(0) | round(0) | int -%}
            {%- set c_net = states('input_number.nfc_mod_loaded_remaining') | float(0) | round(0) | int -%}
            {%- set d_gross = states('input_number.nfc_mod_gross') | float(0) | round(0) | int -%}
            {%- set c_tare = states('input_number.nfc_mod_loaded_tare') | float(0) | round(0) | int -%}
            {%- set c_gross = c_net + c_tare -%}
            {%- if d_name != c_name or d_mat != c_mat or d_net != c_net or d_gross != c_gross -%}
              on
            {%- else -%}
              off
            {%- endif -%}
          {%- endif -%}
        attributes:
          # Per-field dirty flags — let nfc_modify_commit pick which save
          # script(s) to call without re-deriving the comparison.
          name_dirty: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid <= 0 -%}
              {{ false }}
            {%- else -%}
              {{ (states('input_text.nfc_mod_name') | default('') | trim)
                 != (states('input_text.nfc_mod_loaded_name') | default('') | trim) }}
            {%- endif -%}
          material_dirty: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid <= 0 -%}
              {{ false }}
            {%- else -%}
              {%- set d_mat = states('input_select.nfc_mod_material') | default('Unknown') -%}
              {%- set c_mat_raw = states('input_text.nfc_mod_loaded_material') | default('') -%}
              {%- set c_mat = c_mat_raw if c_mat_raw != '' else 'Unknown' -%}
              {{ d_mat != c_mat }}
            {%- endif -%}
          net_dirty: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid <= 0 -%}
              {{ false }}
            {%- else -%}
              {{ (states('input_number.nfc_weight_edit') | float(0) | round(0) | int)
                 != (states('input_number.nfc_mod_loaded_remaining') | float(0) | round(0) | int) }}
            {%- endif -%}
          gross_dirty: >-
            {%- set sid = states('input_number.nfc_weight_spool_id') | float(0) -%}
            {%- if sid <= 0 -%}
              {{ false }}
            {%- else -%}
              {%- set d_gross = states('input_number.nfc_mod_gross') | float(0) | round(0) | int -%}
              {%- set c_net = states('input_number.nfc_mod_loaded_remaining') | float(0) | round(0) | int -%}
              {%- set c_tare = states('input_number.nfc_mod_loaded_tare') | float(0) | round(0) | int -%}
              {{ d_gross != (c_net + c_tare) }}
            {%- endif -%}

script:
  # ── SpoolTap CONFIG: push secrets.yaml values into the CONFIG helpers ──
  # Run after install, and after any secrets.yaml change — but reload the
  # YAML config (or restart) FIRST so !secret re-resolves, then run this.
  spooltap_apply_config:
    alias: "SpoolTap: Apply Config"
    icon: mdi:cog-sync
    mode: single
    sequence:
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_spoolman_base }
        data: { value: !secret spooltap_spoolman_base }
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_bambuddy_base }
        data: { value: !secret spooltap_bambuddy_base }
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_ams_prefix }
        data: { value: !secret spooltap_ams_prefix }
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_external_sensor }
        data: { value: !secret spooltap_external_sensor }
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_print_status_sensor }
        data: { value: !secret spooltap_print_status_sensor }
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_notify_target }
        data: { value: !secret spooltap_notify_target }
      - action: input_text.set_value
        target: { entity_id: input_text.spooltap_nozzle }
        data: { value: !secret spooltap_nozzle }
      - action: input_number.set_value
        target: { entity_id: input_number.spooltap_printer_id }
        data: { value: !secret spooltap_printer_id }
  # Bind the most-recently-scanned tag to a Spoolman spool (read-modify-write).
  nfc_bind_spool:
    alias: "NFC: Bind Tag to Spool (numeric id)"
    icon: mdi:link-variant
    mode: single
    sequence:
      - variables:
          tag: "{{ states('input_text.nfc_last_scanned') }}"
          spool_id: "{{ states('input_number.nfc_target_spool_id') | int(0) }}"
      - condition: template
        value_template: "{{ tag not in ['', 'unknown', 'unavailable'] and spool_id > 0 }}"
      # Cross-role guard: refuse to bind a tag that is already an AMS slot
      # tag. Slot tags are permanent fixtures; a dual-role tag would make
      # the scan dispatch ambiguous (slot match wins, spool match ignored).
      - variables:
          slot_conflict: >-
            {%- set ns = namespace(found='') -%}
            {%- for s in ['left_1','left_2','left_3','left_4','right_1','right_2','right_3','right_4'] -%}
              {%- if states('input_text.nfc_slot_' ~ s) == tag -%}
                {%- set ns.found = s -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.found -}}
      - if:
          - condition: template
            value_template: "{{ slot_conflict != '' }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >-
                {%- set s = slot_conflict -%}
                {%- set slot_conflict_disp = 'External' if s == 'external'
                    else ('Left ' ~ s[-1] if s.startswith('left_')
                    else ('Right ' ~ s[-1] if s.startswith('right_')
                    else (s | replace('_', ' ') | title))) -%}
                NOT bound: Tag {{ tag }} is already bound to AMS {{ slot_conflict_disp }} — use a different Tag for this Spool.
          - stop: "tag already bound to an AMS Slot"
      # Tag recycling: when a tag moves from an emptied spool to a new one,
      # clear it everywhere else first. Search ALL spools via the API
      # (archived spools have no HA sensor, so an HA-side search would miss
      # them) and blank nfc_tag on any other spool holding this tag.
      - action: rest_command.spoolman_get_all_spools
        response_variable: allspools
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (allspools is defined and allspools.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman — Tag not bound, try again."
          - stop: "spoolman get_all failed (bind)"
      - variables:
          stale_ids: >-
            {%- set ns = namespace(ids=[]) -%}
            {%- for s in allspools.content -%}
              {%- if (s.extra.nfc_tag | default('')) == '"' ~ tag ~ '"'
                     and s.id | int(0) != spool_id -%}
                {%- set ns.ids = ns.ids + [s.id] -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.ids -}}
      - repeat:
          for_each: "{{ stale_ids }}"
          sequence:
            - action: rest_command.spoolman_get_spool
              data:
                spool_id: "{{ repeat.item }}"
              response_variable: stale_spool
              continue_on_error: true
            - if:
                - condition: template
                  value_template: "{{ not (stale_spool is defined and stale_spool.status | default(0) == 200) }}"
              then:
                - action: input_text.set_value
                  target:
                    entity_id: input_text.nfc_register_status
                  data:
                    value: "⚠ Couldn't finish clearing the old tag from spool {{ repeat.item }} — tag not bound, try again."
                - stop: "spoolman get failed (stale evict)"
            - variables:
                stale_extra: >
                  {{ (stale_spool.content.extra | default({}))
                     | combine({'nfc_tag': '""'}) }}
            - action: rest_command.spoolman_patch_spool
              data:
                spool_id: "{{ repeat.item }}"
                body: "{{ {'extra': stale_extra} | to_json }}"
              response_variable: stale_patch
              continue_on_error: true
            - if:
                - condition: template
                  value_template: "{{ not (stale_patch is defined and stale_patch.status | default(0) == 200) }}"
              then:
                - action: input_text.set_value
                  target:
                    entity_id: input_text.nfc_register_status
                  data:
                    value: "⚠ Couldn't clear the old tag from spool {{ repeat.item }} — tag not bound, try again."
                - stop: "spoolman patch failed (stale evict)"
      - action: rest_command.spoolman_get_spool
        data:
          spool_id: "{{ spool_id }}"
        response_variable: spool
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (spool is defined and spool.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to read spool {{ spool_id }} — tag not bound, try again."
          - stop: "spoolman get failed (bind target)"
      - variables:
          new_extra: >
            {{ (spool.content.extra | default({}))
               | combine({'nfc_tag': '"' ~ tag ~ '"'}) }}
      - action: rest_command.spoolman_patch_spool
        data:
          spool_id: "{{ spool_id }}"
          body: "{{ {'extra': new_extra} | to_json }}"
        response_variable: bind_patch
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (bind_patch is defined and bind_patch.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't save the tag to spool {{ spool_id }} — not bound, try again."
          - stop: "spoolman patch failed (bind target)"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: >-
            Bound Tag {{ tag }} → Spool #{{ spool_id }}{% if stale_ids | count > 0 %} (recycled — cleared from Spool #{{ stale_ids | map('string') | join(', #') }}){% endif %}
      # All spools were batch-materialized with empty nfc_tag/nfc_active_tray
      # extras (2026-06-12), so the sensor exists for every known spool and a
      # coordinator refresh (update_entity — cheap, no entity teardown) makes
      # the new value readable immediately instead of waiting for the 15s
      # poll. The full config-entry reload survives ONLY as the fallback for
      # a brand-new spool that postdates materialization (the nightly profile
      # sync re-materializes, so this should be rare-to-never). Per-bind
      # reloads caused the 2026-06-12 storm incident: each reload blips
      # thousands of entity states, floods client websockets ("connection
      # failed"), and starves the bambu_lab MQTT path into timeouts.
      # NOTE: `not in states` is broken on this HA build — use explicit
      # entity_id list membership.
      - if:
          - condition: template
            value_template: >
              {{ ('sensor.spoolman_spool_' ~ spool_id ~ '_extra_nfc_tag')
                 not in (states.sensor | map(attribute='entity_id') | list) }}
        then:
          - action: homeassistant.reload_config_entry
            data:
              entry_id: !secret spooltap_spoolman_config_entry_id
        else:
          - action: homeassistant.update_entity
            target:
              entity_id: "sensor.spoolman_spool_{{ spool_id }}_extra_nfc_tag"

  # --- Faceted spool picker ------------------------------------------
  # Rebuild the three picker dropdowns from the live Spoolman sensors.
  # Pool rules: archived spools and Bambu RFID spools (extra.tag set) are
  # ALWAYS excluded; pool mode = Untagged (no nfc_tag yet) / All Active (tagged
  # marked with a trailing ✓ tagged) / Tagged (tagged only). Brand and Type facet
  # each other; the Spool list honors both. Labels:
  # "#id — Vendor Name (Material) — Ng" in numeric spool-id order.
  # input_select.set_options keeps the current selection when still in the
  # new list, otherwise resets to the first option ("Any" / "Select…").
  nfc_rebuild_spool_filters:
    alias: "NFC: Rebuild Spool Picker (Bind)"
    icon: mdi:filter-cog
    mode: queued
    max: 5
    sequence:
      - variables:
          brand_sel: "{{ states('input_select.nfc_filter_brand') }}"
          type_sel: "{{ states('input_select.nfc_filter_type') }}"
          pool: "{{ states('input_select.nfc_pool_mode') }}"
      - variables:
          brand_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) -%}
              {%- set bambu = (s.attributes.extra_tag | default('')) != '' -%}
              {%- set tagged = (s.attributes.extra_nfc_tag | default('')) != '' -%}
              {%- set vend = s.attributes.filament_vendor_name | default('Unknown') -%}
              {%- set mat = s.attributes.filament_material | default('Unknown') -%}
              {%- if not bambu
                   and (pool == 'All Active' or (pool == 'Untagged' and not tagged) or (pool == 'Tagged' and tagged))
                   and (type_sel == 'Any' or mat == type_sel) -%}
                {%- set ns.items = ns.items + [vend] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Any'] + (ns.items | unique | sort | list) }}
          type_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) -%}
              {%- set bambu = (s.attributes.extra_tag | default('')) != '' -%}
              {%- set tagged = (s.attributes.extra_nfc_tag | default('')) != '' -%}
              {%- set vend = s.attributes.filament_vendor_name | default('Unknown') -%}
              {%- set mat = s.attributes.filament_material | default('Unknown') -%}
              {%- if not bambu
                   and (pool == 'All Active' or (pool == 'Untagged' and not tagged) or (pool == 'Tagged' and tagged))
                   and (brand_sel == 'Any' or vend == brand_sel) -%}
                {%- set ns.items = ns.items + [mat] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Any'] + (ns.items | unique | sort | list) }}
          pick_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) | sort(attribute='attributes.id') -%}
              {%- set bambu = (s.attributes.extra_tag | default('')) != '' -%}
              {%- set tagged = (s.attributes.extra_nfc_tag | default('')) != '' -%}
              {%- set vend = s.attributes.filament_vendor_name | default('Unknown') -%}
              {%- set mat = s.attributes.filament_material | default('Unknown') -%}
              {%- if not bambu
                   and (pool == 'All Active' or (pool == 'Untagged' and not tagged) or (pool == 'Tagged' and tagged))
                   and (brand_sel == 'Any' or vend == brand_sel)
                   and (type_sel == 'Any' or mat == type_sel) -%}
                {%- set ns.items = ns.items + ['#' ~ s.attributes.id ~ ' — ' ~ vend ~ ' '
                     ~ (s.attributes.filament_name | default('?')) ~ ' (' ~ mat ~ ') — '
                     ~ ((s.attributes.remaining_weight | default(0)) | round(0) | int) ~ 'g'
                     ~ (' ✓ tagged' if tagged and pool != 'Untagged' else '')] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Select…'] + ns.items }}
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_filter_brand
        data:
          options: "{{ brand_opts }}"
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_filter_type
        data:
          options: "{{ type_opts }}"
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_spool_pick
        data:
          options: "{{ pick_opts }}"

  # "Clear" (Clear Filters) dashboard button: reset Brand/Type to Any and
  # rebuild (which also resets the Spool pick to "Select…").
  nfc_clear_spool_filters:
    alias: "NFC: Clear Spool Picker filters (Bind)"
    icon: mdi:filter-remove
    mode: restart
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_filter_brand
        data:
          option: "Any"
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_filter_type
        data:
          option: "Any"
      - action: script.nfc_rebuild_spool_filters

  # Bind the scanned tag to the spool chosen in the picker. Thin wrapper:
  # parses the "#id" prefix, funnels through nfc_bind_spool (so ALL its
  # guards apply unchanged — slot-tag refusal, recycling eviction, Spoolman
  # reload, status notification), then clears the filters (which also drops
  # the now-tagged spool from the default Untagged pool).
  nfc_bind_spool_from_pick:
    alias: "NFC: Bind Tag to Spool (picker)"
    icon: mdi:link-variant-plus
    mode: single
    sequence:
      - variables:
          tag: "{{ states('input_text.nfc_last_scanned') }}"
          pick: "{{ states('input_select.nfc_spool_pick') }}"
          pick_id: >-
            {{ pick | regex_findall('^#(\d+)') | first | default(0) }}
      - if:
          - condition: template
            value_template: "{{ tag in ['', 'unknown', 'unavailable'] }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "NOT bound: Scan the Spool's Tag first, then pick a Spool and Bind."
          - stop: "no tag scanned"
      - if:
          - condition: template
            value_template: "{{ pick_id | int(0) <= 0 }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "NOT bound: Pick a Spool from the Spool Picker first."
          - stop: "no spool picked"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_target_spool_id
        data:
          value: "{{ pick_id | int }}"
      - action: script.nfc_bind_spool
      # nfc_bind_spool may reload the Spoolman config entry (sensors blip
      # unavailable for a moment) — let them settle before rebuilding the
      # picker lists from those sensors.
      - delay: "00:00:05"
      - action: script.nfc_clear_spool_filters

  # --- Modify Spool (Phase B) ------------------------------------------
  # Rebuild the Modify picker dropdowns. Pool = ALL active non-Bambu spools
  # (tagged AND untagged — inventory covers both). Labels append the bound
  # tag's name ("[Spool 07]") since that's the most visible identifier on a
  # physical spool at inventory time. Also maintains the Tag dropdown (bound
  # tags by name) and the Material list (curated set + every material seen
  # in inventory).
  nfc_rebuild_modify_filters:
    alias: "NFC: Rebuild Spool Picker (Modify)"
    icon: mdi:filter-cog-outline
    mode: queued
    max: 5
    sequence:
      - variables:
          brand_sel: "{{ states('input_select.nfc_mod_filter_brand') }}"
          type_sel: "{{ states('input_select.nfc_mod_filter_type') }}"
      - variables:
          tag_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true)
                 | selectattr('attributes.extra_nfc_tag', 'defined')
                 | selectattr('attributes.extra_nfc_tag', 'ne', '') -%}
              {%- if (s.attributes.extra_tag | default('')) == '' -%}
                {%- set tname = states.tag | selectattr('attributes.tag_id', 'eq', s.attributes.extra_nfc_tag)
                     | map(attribute='name') | first | default('') -%}
                {%- if tname != '' -%}{%- set ns.items = ns.items + [tname] -%}{%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Select Spool Tag…'] + (ns.items | unique | sort | list) }}
          brand_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) -%}
              {%- set vend = s.attributes.filament_vendor_name | default('Unknown') -%}
              {%- set mat = s.attributes.filament_material | default('Unknown') -%}
              {%- if (s.attributes.extra_tag | default('')) == ''
                   and (type_sel == 'Any' or mat == type_sel) -%}
                {%- set ns.items = ns.items + [vend] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Any'] + (ns.items | unique | sort | list) }}
          type_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) -%}
              {%- set vend = s.attributes.filament_vendor_name | default('Unknown') -%}
              {%- set mat = s.attributes.filament_material | default('Unknown') -%}
              {%- if (s.attributes.extra_tag | default('')) == ''
                   and (brand_sel == 'Any' or vend == brand_sel) -%}
                {%- set ns.items = ns.items + [mat] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Any'] + (ns.items | unique | sort | list) }}
          pick_opts: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) | sort(attribute='attributes.id') -%}
              {%- set vend = s.attributes.filament_vendor_name | default('Unknown') -%}
              {%- set mat = s.attributes.filament_material | default('Unknown') -%}
              {%- if (s.attributes.extra_tag | default('')) == ''
                   and (brand_sel == 'Any' or vend == brand_sel)
                   and (type_sel == 'Any' or mat == type_sel) -%}
                {%- set tname = '' if (s.attributes.extra_nfc_tag | default('')) == ''
                     else (states.tag | selectattr('attributes.tag_id', 'eq', s.attributes.extra_nfc_tag)
                           | map(attribute='name') | first | default('')) -%}
                {%- set ns.items = ns.items + ['#' ~ s.attributes.id ~ ' — ' ~ vend ~ ' '
                     ~ (s.attributes.filament_name | default('?')) ~ ' (' ~ mat ~ ') — '
                     ~ ((s.attributes.remaining_weight | default(0)) | round(0) | int) ~ 'g'
                     ~ (' [' ~ tname ~ ']' if tname != '' else '')] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ['Select…'] + ns.items }}
          material_opts: >-
            {%- set base = ['PLA', 'PLA+', 'PLA-CF', 'PETG', 'PETG-CF', 'ABS', 'ASA', 'TPU', 'PA', 'PA-CF', 'PC', 'Unknown'] -%}
            {%- set ns = namespace(items=base) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | rejectattr('attributes.archived', 'eq', true) -%}
              {%- set mat = s.attributes.filament_material | default('') -%}
              {%- if mat != '' and mat not in ns.items -%}{%- set ns.items = ns.items + [mat] -%}{%- endif -%}
            {%- endfor -%}
            {{ ns.items | sort }}
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_mod_tag
        data:
          options: "{{ tag_opts }}"
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_mod_filter_brand
        data:
          options: "{{ brand_opts }}"
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_mod_filter_type
        data:
          options: "{{ type_opts }}"
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_mod_spool_pick
        data:
          options: "{{ pick_opts }}"
      - action: input_select.set_options
        target:
          entity_id: input_select.nfc_mod_material
        data:
          options: "{{ material_opts }}"

  nfc_clear_modify_filters:
    alias: "NFC: Clear Spool Picker filters (Modify)"
    icon: mdi:filter-remove-outline
    mode: restart
    sequence:
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_mod_tag
        data:
          option: "Select Spool Tag…"
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_mod_filter_brand
        data:
          option: "Any"
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_mod_filter_type
        data:
          option: "Any"
      - action: script.nfc_rebuild_modify_filters

  # "Done / Unload": clear the Modify panel back to its resting state.
  # The Edit dashboard section's visibility is tied to nfc_weight_spool_id,
  # so this also hides the edit tools.
  nfc_unload_modify:
    alias: "NFC: Close Modify panel"
    icon: mdi:close-circle-outline
    mode: single
    sequence:
      # ── Modify-redesign D6 / Q6A ──────────────────────────────────
      # Zero the gate FIRST so Section 5 hides immediately (visibility
      # gate is nfc_weight_spool_id > 0). Order matters only because the
      # canonical sensor's attribute templates also gate on this value —
      # they collapse to blank as soon as it hits 0.
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_weight_spool_id
        data:
          value: 0
      # Clear all 4 draft helpers — kills the orphaned-state bug
      # observable at pre-flight 2026-06-16 15:35 (panel closed but
      # nfc_mod_name still held "Panchroma Blue - Regular").
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_name
        data:
          value: ""
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_mod_material
        data:
          option: "Unknown"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_weight_edit
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_mod_gross
        data:
          value: 0
      # Clear all 5 canonical helpers — keeps the dirty diff and header
      # sensor coherent when the panel re-opens for a different spool.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_loaded_spool_id
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_loaded_name
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_loaded_material
        data:
          value: ""
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_mod_loaded_remaining
        data:
          value: 0
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_mod_loaded_tare
        data:
          value: 0
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "Modify panel closed — no Spool loaded."

  # Load a spool into the Modify panel (authoritative GET, not sensor cache).
  # Fills: weight helpers, filament name, material select, and the EXPECTED
  # gross weight (remaining + tare) for scale sanity-checking. The status
  # message lists sibling spools sharing the same filament record, because
  # name/type edits apply to all of them.
  nfc_load_spool_for_modify:
    alias: "NFC: Open Spool in Modify panel"
    icon: mdi:tray-arrow-up
    mode: restart
    fields:
      spool_id:
        description: Spoolman spool id to load
        required: true
    sequence:
      - variables:
          sid: "{{ spool_id | int(0) }}"
      - condition: template
        value_template: "{{ sid > 0 }}"
      - action: rest_command.spoolman_get_spool
        data:
          spool_id: "{{ sid }}"
        response_variable: spool
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (spool is defined and spool.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to open Spool #{{ sid }} — try again."
          - stop: "spoolman get failed (load modify)"
      - if:
          - condition: template
            value_template: "{{ spool.content.archived | default(false) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "Spool #{{ sid }} is ARCHIVED — not opened. Restore it in Spoolman if still in use."
          - stop: "archived spool"
      - variables:
          f_name: "{{ spool.content.filament.name | default('') }}"
          f_mat: "{{ spool.content.filament.material | default('') }}"
          vend: "{{ spool.content.filament.vendor.name | default('?') }}"
          remaining: "{{ (spool.content.get('remaining_weight') or 0) | float(0) | round(1) }}"
          initial: "{{ (spool.content.initial_weight | default(spool.content.filament.weight | default(0), true)) | float(0) | round(0) | int }}"
          tare: >-
            {{ ((spool.content.spool_weight | default(0, true))
                or (spool.content.filament.spool_weight | default(0, true))) | float(0) | round(0) | int }}
          is_bambu: "{{ (spool.content.extra.tag | default('')) not in ['', '\"\"'] }}"
          fid: "{{ spool.content.filament.id | default(0) }}"
          tagname: >-
            {%- set t = (spool.content.extra.nfc_tag | default('')) | replace('"', '') -%}
            {%- if t != '' -%}
              {{ states.tag | selectattr('attributes.tag_id', 'eq', t) | map(attribute='name') | first | default('') }}
            {%- endif -%}
          siblings: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | selectattr('attributes.filament_id', 'defined')
                 | selectattr('attributes.filament_id', 'eq', fid | int(0)) -%}
              {%- if s.attributes.id | int(0) != sid -%}
                {%- set ns.items = ns.items + ['#' ~ s.attributes.id] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.items }}
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_weight_spool_id
        data:
          value: "{{ sid }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_weight_edit
        data:
          value: "{{ remaining }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_mod_gross
        data:
          value: "{{ (remaining | float(0) + tare | float(0)) | round(0) | int }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_name
        data:
          value: "{{ f_name }}"
      - if:
          - condition: template
            value_template: "{{ f_mat in (state_attr('input_select.nfc_mod_material', 'options') or []) }}"
        then:
          - action: input_select.select_option
            target:
              entity_id: input_select.nfc_mod_material
            data:
              option: "{{ f_mat }}"
        else:
          - action: input_select.select_option
            target:
              entity_id: input_select.nfc_mod_material
            data:
              option: "Unknown"
      # ── Modify-redesign D5 ────────────────────────────────────────
      # Atomically write the 5 canonical loaded-spool helpers alongside
      # the drafts above. These feed sensor.nfc_modify_loaded_spool (header)
      # and the binary_sensor.nfc_modify_dirty diff. Material falls back to
      # "Unknown" when the filament record's material is empty — matches the
      # draft-side sentinel so a freshly-loaded spool reads pristine.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_loaded_spool_id
        data:
          value: "{{ sid | string }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_loaded_name
        data:
          value: "{{ f_name }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_mod_loaded_material
        data:
          value: "{{ f_mat if f_mat != '' else 'Unknown' }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_mod_loaded_remaining
        data:
          value: "{{ remaining | float(0) | round(0) | int }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_mod_loaded_tare
        data:
          value: "{{ tare | float(0) | round(0) | int }}"
      - variables:
          msg: >-
            Opened Spool #{{ sid }}: {{ vend }} {{ f_name }} ({{ f_mat if f_mat != '' else 'Unknown' }}) —
            {{ remaining }}g of {{ initial }}g, tare {{ tare }}g, expected gross {{ (remaining | float(0) + tare | float(0)) | round(0) | int }}g.{% if tagname != '' %} Tag: {{ tagname }}.{% endif %}{% if siblings | count > 0 %} Sibling Spool(s) {{ siblings | join(', ') }} share this Filament — edits to name/material affect ALL.{% endif %}{% if is_bambu %} Bambu RFID Spool — auto-managed; edits may be overwritten.{% endif %}
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "{{ msg | truncate(250, true, '…') }}"

  # Weigh-in mode: remaining = measured GROSS - tare. The honest path for
  # inventory: put the spool on a scale, type what it says, done.
  nfc_apply_weighin:
    alias: "NFC: Apply Weigh-In (save gross)"
    icon: mdi:scale-balance
    mode: single
    sequence:
      - variables:
          sid: "{{ states('input_number.nfc_weight_spool_id') | int(0) }}"
          gross: "{{ states('input_number.nfc_mod_gross') | float(0) }}"
      - condition: template
        value_template: "{{ sid > 0 }}"
      - action: rest_command.spoolman_get_spool
        data:
          spool_id: "{{ sid }}"
        response_variable: spool
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (spool is defined and spool.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to open Spool #{{ sid }} — nothing changed, try again."
          - stop: "spoolman get failed (weigh-in)"
      - variables:
          tare: >-
            {{ ((spool.content.spool_weight | default(0, true))
                or (spool.content.filament.spool_weight | default(0, true))) | float(0) }}
          old_remaining: "{{ (spool.content.get('remaining_weight') or 0) | float(0) | round(1) }}"
          initial: "{{ (spool.content.initial_weight | default(spool.content.filament.weight | default(0), true)) | float(0) }}"
      - if:
          - condition: template
            value_template: "{{ tare <= 0 }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Weigh-In failed: Spool #{{ sid }} has no tare (empty-spool) weight in Spoolman — set it on the filament record first."
          - stop: "no tare weight"
      - if:
          - condition: template
            value_template: "{{ gross < tare }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Weigh-In failed: gross {{ gross | round(0) | int }}g is less than the {{ tare | round(0) | int }}g tare — check the scale reading."
          - stop: "gross below tare"
      - variables:
          new_remaining: "{{ (gross - tare) | round(1) }}"
      - action: rest_command.spoolman_patch_spool
        data:
          spool_id: "{{ sid }}"
          body: "{{ {'remaining_weight': new_remaining | float} | to_json }}"
        response_variable: weighin_patch
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (weighin_patch is defined and weighin_patch.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Spoolman didn't save the weigh-in for spool {{ sid }} — not recorded, try again."
          - stop: "spoolman patch failed (weigh-in)"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_weight_edit
        data:
          value: "{{ new_remaining }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: >-
            Weigh-In Spool #{{ sid }}: {{ gross | round(0) | int }}g gross − {{ tare | round(0) | int }}g tare → remaining {{ new_remaining }}g (was {{ old_remaining }}g).{% if new_remaining | float(0) > initial %} NOTE: more than the {{ initial | round(0) | int }}g initial — check tare/initial in Spoolman.{% endif %}

  # Save filament-level corrections (name + material). These live on the
  # SHARED filament record — the status names every affected sibling spool.
  # Material "Unknown" = leave the type unchanged.
  nfc_save_filament_edits:
    alias: "NFC: Save Filament Name & Material"
    icon: mdi:content-save-edit
    mode: single
    sequence:
      - variables:
          sid: "{{ states('input_number.nfc_weight_spool_id') | int(0) }}"
          new_name: "{{ states('input_text.nfc_mod_name') | trim }}"
          mat_sel: "{{ states('input_select.nfc_mod_material') }}"
      - condition: template
        value_template: "{{ sid > 0 and new_name != '' }}"
      - action: rest_command.spoolman_get_spool
        data:
          spool_id: "{{ sid }}"
        response_variable: spool
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (spool is defined and spool.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to open Spool #{{ sid }} — try again."
          - stop: "spoolman get failed (save edits)"
      - variables:
          fid: "{{ spool.content.filament.id | default(0) | int(0) }}"
      - condition: template
        value_template: "{{ fid > 0 }}"
      - variables:
          body_dict: >-
            {%- if mat_sel not in ['Unknown', '', 'unknown', 'unavailable'] -%}
              {{ {'name': new_name, 'material': mat_sel} }}
            {%- else -%}
              {{ {'name': new_name} }}
            {%- endif -%}
          affected: >-
            {%- set ns = namespace(items=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | selectattr('attributes.filament_id', 'defined')
                 | selectattr('attributes.filament_id', 'eq', fid) -%}
              {%- set ns.items = ns.items + ['#' ~ s.attributes.id] -%}
            {%- endfor -%}
            {{ ns.items }}
      - action: rest_command.spoolman_patch_filament
        data:
          filament_id: "{{ fid }}"
          body: "{{ body_dict | to_json }}"
        response_variable: filedit_patch
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (filedit_patch is defined and filedit_patch.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Spoolman didn't save the filament edits for #{{ fid }} — not recorded, try again."
          - stop: "spoolman patch failed (save edits)"
      - variables:
          msg: >-
            Updated Filament #{{ fid }}: '{{ new_name }}'{% if mat_sel not in ['Unknown', '', 'unknown', 'unavailable'] %} ({{ mat_sel }}){% else %} (type unchanged){% endif %} — applies to Spools {{ affected | join(', ') }}.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "{{ msg | truncate(250, true, '…') }}"

  # ── Modify-redesign D2 ──────────────────────────────────────────
  # Unified Save orchestrator. Reads the per-field dirty flags from
  # binary_sensor.nfc_modify_dirty's attributes and calls the three
  # underlying save scripts (preserved unchanged) for whichever fields
  # changed. After all writes, re-reads canonical state via
  # nfc_load_spool_for_modify (Q2A) so net/gross/name/material on-screen
  # match server truth — kills the asymmetric drift mechanism documented
  # in UC6. mode: restart so a rapid double-tap collapses cleanly.
  #
  # Order matters: filament edits FIRST (shared filament record warning
  # surfaces before the patch), then weight. Weight resolution: if both
  # net and gross are dirty, gross wins (nfc_apply_weighin re-derives
  # net from gross-tare and back-writes nfc_weight_edit, so calling net
  # first would be clobbered). If only net is dirty, call the net path.
  # The post-save reload re-asserts both helpers from Spoolman.
  nfc_modify_commit:
    alias: "NFC: Save Modify (unified)"
    icon: mdi:content-save-check
    mode: restart
    sequence:
      - variables:
          sid: "{{ states('input_number.nfc_weight_spool_id') | int(0) }}"
          dirty_state: "{{ states('binary_sensor.nfc_modify_dirty') }}"
          name_dirty: "{{ state_attr('binary_sensor.nfc_modify_dirty', 'name_dirty') | default(false) }}"
          mat_dirty: "{{ state_attr('binary_sensor.nfc_modify_dirty', 'material_dirty') | default(false) }}"
          net_dirty: "{{ state_attr('binary_sensor.nfc_modify_dirty', 'net_dirty') | default(false) }}"
          gross_dirty: "{{ state_attr('binary_sensor.nfc_modify_dirty', 'gross_dirty') | default(false) }}"
      - condition: template
        value_template: "{{ sid > 0 }}"
      # No-op short-circuit: dirty=off OR every per-field flag false.
      # Per Q4=A (modify-remediation spec 55deaac): truly silent — no
      # status text write, no state change. Just stop. The user gets no
      # feedback for an unnecessary Save tap, which is the accepted
      # trade-off (Save is always-enabled per Q2=A so accidental taps
      # are expected).
      - if:
          - condition: template
            value_template: >-
              {{ dirty_state != 'on' and not (name_dirty or mat_dirty or net_dirty or gross_dirty) }}
        then:
          - stop: "no-op save"
      # Shared-filament-record warning (D2): surfaces BEFORE the patch so
      # the user sees the implication of a name/material edit. Cleared by
      # the per-script success status that follows.
      - if:
          - condition: template
            value_template: "{{ name_dirty or mat_dirty }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "Saving name/material — applies to all spools sharing this filament."
          - delay: "00:00:02"
          - action: script.nfc_save_filament_edits
      # Weight: gross wins when both are dirty (nfc_apply_weighin
      # re-derives + back-writes net, so a separate net call would race).
      - if:
          - condition: template
            value_template: "{{ gross_dirty }}"
        then:
          - action: script.nfc_apply_weighin
        else:
          - if:
              - condition: template
                value_template: "{{ net_dirty }}"
            then:
              - action: script.nfc_update_remaining_weight
      # Post-save reload (Q2A): re-read canonical Spoolman state so
      # both editable fields and the 5 canonical helpers re-converge.
      # nfc_load_spool_for_modify is mode: restart and writes all 4
      # drafts + 5 canonicals atomically.
      - action: script.nfc_load_spool_for_modify
        data:
          spool_id: "{{ sid }}"
      # Picker label refresh (D8): wait for the Spoolman coordinator to
      # settle before rebuilding picker labels so the new remaining_weight
      # shows up. 5s matches the existing nfc_archive_spool cadence (L73
      # fragility window in §11).
      - delay: "00:00:05"
      - action: script.nfc_rebuild_modify_filters

  # Inventory housekeeping: archive an empty/retired spool. Frees its NFC
  # tag for recycling (the bind eviction handles the Spoolman side; just
  # peel the tag and re-bind it). Reloads the Spoolman entry so the archived
  # spool's sensors drop out of HA (expect the brief UI blip).
  nfc_archive_spool:
    alias: "NFC: Archive Spool"
    icon: mdi:archive-arrow-down
    mode: single
    sequence:
      - variables:
          sid: "{{ states('input_number.nfc_weight_spool_id') | int(0) }}"
      - condition: template
        value_template: "{{ sid > 0 }}"
      - action: rest_command.spoolman_get_spool
        data:
          spool_id: "{{ sid }}"
        response_variable: spool
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (spool is defined and spool.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to open Spool #{{ sid }} — try again."
          - stop: "spoolman get failed (archive)"
      - variables:
          label: "{{ spool.content.filament.vendor.name | default('?') }} {{ spool.content.filament.name | default('?') }}"
          tagname: >-
            {%- set t = (spool.content.extra.nfc_tag | default('')) | replace('"', '') -%}
            {%- if t != '' -%}
              {{ states.tag | selectattr('attributes.tag_id', 'eq', t) | map(attribute='name') | first | default('') }}
            {%- endif -%}
      - action: rest_command.spoolman_patch_spool
        data:
          spool_id: "{{ sid }}"
          body: "{{ {'archived': true} | to_json }}"
        response_variable: archive_patch
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (archive_patch is defined and archive_patch.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Spoolman didn't archive spool {{ sid }} — not archived, try again."
          - stop: "spoolman patch failed (archive)"
      - action: input_number.set_value
        target:
          entity_id: input_number.nfc_weight_spool_id
        data:
          value: 0
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "Archived Spool #{{ sid }} ({{ label }}).{% if tagname != '' %} Tag '{{ tagname }}' is now free — peel it off and Bind it to a new Spool.{% endif %}"
      - action: homeassistant.reload_config_entry
        data:
          entry_id: !secret spooltap_spoolman_config_entry_id
      - delay: "00:00:05"
      - action: script.nfc_rebuild_modify_filters
      - action: script.nfc_rebuild_spool_filters

  # Bind the most-recently-scanned tag to the AMS slot chosen in nfc_slot_select.
  nfc_bind_slot:
    alias: "NFC: Bind Tag to Slot"
    icon: mdi:tray-plus
    mode: single
    sequence:
      - variables:
          tag: "{{ states('input_text.nfc_last_scanned') }}"
          # nfc_slot_select now exposes user-visible display names ("AMS Left 2",
          # "External", etc.). The script still needs the INTERNAL key ("left_2",
          # "external") to address the per-slot helpers and the slot maps.
          # slot_display = what the user sees in the dropdown.
          # slot         = the internal key derived from slot_display.
          # IMPORTANT: any new option added to nfc_slot_select (e.g. a 3rd AMS
          # unit) MUST add an explicit branch below — the final `else d`
          # fallback emits the display name verbatim, which would target a
          # nonexistent input_text.nfc_slot_<display name> and silently no-op.
          slot_display: "{{ states('input_select.nfc_slot_select') }}"
          slot: >-
            {%- set d = states('input_select.nfc_slot_select') -%}
            {{ 'external' if d == 'External'
               else ('left_' ~ d[-1] if d.startswith('AMS Left ')
               else ('right_' ~ d[-1] if d.startswith('AMS Right ')
               else d)) }}
          # slot_disp = the SHORT friendly form ("Left 2", "Right 4", "External")
          # used downstream as "AMS {{ slot_disp }}" in status strings. We derive
          # it from the INTERNAL key, not from slot_display, to avoid an
          # "AMS AMS Left 2" double-prefix after Q11 made slot_display = full name.
          slot_disp: >-
            {%- set s = ('external' if states('input_select.nfc_slot_select') == 'External'
                         else ('left_' ~ states('input_select.nfc_slot_select')[-1] if states('input_select.nfc_slot_select').startswith('AMS Left ')
                         else ('right_' ~ states('input_select.nfc_slot_select')[-1] if states('input_select.nfc_slot_select').startswith('AMS Right ')
                         else states('input_select.nfc_slot_select')))) -%}
            {{ 'External' if s == 'external'
               else ('Left ' ~ s[-1] if s.startswith('left_')
               else ('Right ' ~ s[-1] if s.startswith('right_')
               else (s | replace('_', ' ') | title))) }}
      - condition: template
        value_template: "{{ tag not in ['', 'unknown', 'unavailable'] }}"
      # Cross-role guard: refuse to bind a tag that is already a SPOOL tag
      # (searches the active spools' extra_nfc_tag sensors).
      - variables:
          spool_conflict: >-
            {%- set ns = namespace(found='') -%}
            {%- for s in states.sensor
                 | selectattr('entity_id', 'search', '_extra_nfc_tag$')
                 | selectattr('state', 'eq', tag) -%}
              {%- set ns.found = s.object_id.split('_')[2] -%}
            {%- endfor -%}
            {{- ns.found -}}
      - if:
          - condition: template
            value_template: "{{ spool_conflict != '' }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "NOT bound: Tag {{ tag }} is already bound to Spool #{{ spool_conflict }} — use a different Tag for this Slot."
          - stop: "tag already bound to a spool"
      # A tag marks exactly ONE slot — if this tag was previously bound to a
      # different slot (tag physically moved), clear the old binding so the
      # dispatch never sees two slots claiming one tag.
      - variables:
          prev_slot: >-
            {%- set ns = namespace(found='') -%}
            {%- for s in ['left_1','left_2','left_3','left_4','right_1','right_2','right_3','right_4'] if s != slot -%}
              {%- if states('input_text.nfc_slot_' ~ s) == tag -%}
                {%- set ns.found = s -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.found -}}
      - if:
          - condition: template
            value_template: "{{ prev_slot != '' }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: "input_text.nfc_slot_{{ prev_slot }}"
            data:
              value: ""
      - action: input_text.set_value
        target:
          entity_id: "input_text.nfc_slot_{{ slot }}"
        data:
          value: "{{ tag }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "Bound Tag {{ tag }} → AMS {{ slot_disp }}"

  # Phase A: assign the most-recently-scanned spool to the AMS tray pending
  # in input_text.nfc_pending_slot. Pushes the spool's filament type/color/
  # temps to the printer (bambu_lab.set_filament) and records the binding in
  # Spoolman's nfc_active_tray extra field (read-modify-write, mirrors
  # nfc_bind_spool's nfc_tag handling).
  nfc_assign_spool_to_tray:
    alias: "NFC: Assign Spool to Slot (from scan)"
    icon: mdi:tray-arrow-down
    # restart, NOT single: a push retry can hold this script for ~30s, and
    # under `single` every scan-pair during that window was silently
    # DROPPED (live incident 2026-06-12 — "bound up"). A new scan-pair now
    # supersedes any in-flight run.
    mode: restart
    sequence:
      - variables:
          tag: "{{ states('input_text.nfc_last_scanned') }}"
          slot: "{{ states('input_text.nfc_pending_slot') }}"
          slot_disp: >-
            {%- set s = states('input_text.nfc_pending_slot') -%}
            {{ 'External' if s == 'external'
               else ('Left ' ~ s[-1] if s.startswith('left_')
               else ('Right ' ~ s[-1] if s.startswith('right_')
               else (s | replace('_', ' ') | title))) }}
          spool_id: >-
            {%- set ns = namespace(found=0) -%}
            {%- for s in states.sensor
                 | selectattr('entity_id', 'search', '_extra_nfc_tag$')
                 | selectattr('state', 'eq', tag) -%}
              {%- set ns.found = s.object_id.split('_')[2] | int(0) -%}
            {%- endfor -%}
            {{- ns.found -}}
      - condition: template
        value_template: >
          {{ spool_id | int(0) > 0
             and slot not in ['', 'unknown', 'unavailable'] }}
      - action: rest_command.spoolman_get_spool
        data:
          spool_id: "{{ spool_id }}"
        response_variable: spool
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (spool is defined and spool.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to open Spool #{{ spool_id }} — nothing changed. Re-scan the pair."
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_pending_slot
            data:
              value: ""
          - stop: "spoolman get failed (assign)"
      # Guard (do NOT write to printer/Bambuddy) for:
      #  * Bambu RFID spools (extra.tag set) — Bambuddy auto-manages them via
      #    the embedded RFID; the tray is effectively un-writable by us.
      #  * Archived/retired spools — surfaced here defensively in case an
      #    archived spool still has its HA sensor (the resolver covers the
      #    case where it has dropped out of HA).
      - if:
          - condition: template
            value_template: >
              {{ (spool.content.extra.tag | default('')) not in ['', '""']
                 or (spool.content.archived | default(false)) }}
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >-
                {% if spool.content.archived | default(false) %}Spool #{{ spool_id }} is ARCHIVED — not assigned. Restore it in Spoolman if still in use.{% else %}Spool #{{ spool_id }} is a Bambu RFID Spool — Bambuddy manages this automatically; skipping manual Assign.{% endif %}
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_pending_slot
            data:
              value: ""
          - stop: "Bambu or archived spool — no manual assignment"
      # Filament profile resolution: the filament-level Spoolman extra
      # `nfc_tray_idx` carries the exact Bambu profile code (custom Bambu
      # Studio P-code or official GF catalog code) so the printer shows the
      # real vendor/product identity. The material->Generic map is the
      # last-resort fallback only.
      - variables:
          material: "{{ spool.content.filament.material or 'PLA' }}"
          color_hex: "{{ (spool.content.filament.color_hex or 'FFFFFF') | upper }}"
          # .get(): Spoolman OMITS unset fields from its JSON, and jinja's
          # float filter cannot catch an undefined ATTRIBUTE access — a
          # filament with no extruder temp crashed the whole script here
          # (live incident: first Siraya PEBA assignment, 2026-06-12).
          extruder_temp: "{{ (spool.content.filament.get('settings_extruder_temp') or 0) | float(0) }}"
          slug: "{{ material | lower | replace('-', '_') | replace('+', '_plus') }}"
          known_slugs: ['pla', 'pla_plus', 'pla_cf', 'petg', 'petg_cf', 'pa']
          tray_info_idx_map:
            pla: GFL99
            pla_plus: GFL99
            pla_cf: GFL98
            petg: GFG99
            petg_cf: GFG98
            pa: GFN99
          tray_entity: >-
            {{ states('input_text.spooltap_external_sensor') if slot == 'external'
               else states('input_text.spooltap_ams_prefix') ~ slot.split('_')[0] ~ '_tray_' ~ slot.split('_')[1] }}
          # Spoolman extra TEXT values arrive JSON-quoted ('"P6705242"') —
          # strip quotes instead of from_json (which chokes on '').
          profile_idx: >-
            {{ (spool.content.filament.extra | default({})).get('nfc_tray_idx', '')
               | replace('"', '') | trim }}
          setting_idx: >-
            {{ (spool.content.filament.extra | default({})).get('nfc_setting_id', '')
               | replace('"', '') | trim }}
          harvested_min: "{{ (spool.content.filament.extra | default({})).get('nfc_temp_min', 0) | int(0) }}"
          harvested_max: "{{ (spool.content.filament.extra | default({})).get('nfc_temp_max', 0) | int(0) }}"
      - variables:
          used_profile: "{{ profile_idx not in ['', 'null', 'None'] }}"
          # Harvest-on-assign: the tray ALREADY carries the exact profile
          # we're about to push (user set it via the slicer) and we have no
          # harvested temps yet -> the tray's current temps are the
          # profile's true values. Provenance-safe: we haven't written this
          # tray yet, so the temps can't be our own earlier defaults.
          harvest_ok: >-
            {{ used_profile and harvested_min | int(0) == 0
               and state_attr(tray_entity, 'filament_id') == profile_idx
               and state_attr(tray_entity, 'nozzle_temp_min') | int(0) > 0 }}
      - variables:
          effective_slug: "{{ slug if slug in known_slugs else 'default' }}"
          tray_info_idx: "{{ profile_idx if used_profile else tray_info_idx_map.get(slug, 'GFL99') }}"
          # Temp priority: harvested profile range (incl. live harvest above)
          # -> Spoolman extruder temp +/-10 -> dashboard material defaults.
          # These only gate the purge preheat — print temps come from the
          # slicer profile, so close-enough is genuinely fine here.
          nozzle_temp_min: >
            {{ state_attr(tray_entity, 'nozzle_temp_min') | int if harvest_ok
               else (harvested_min | int(0) if harvested_min | int(0) > 0
               else ((extruder_temp - 10) | round | int if extruder_temp > 0
               else states('input_number.nfc_temp_min_' ~ (slug if slug in known_slugs else 'default')) | float(190) | round | int)) }}
          nozzle_temp_max: >
            {{ state_attr(tray_entity, 'nozzle_temp_max') | int if harvest_ok
               else (harvested_max | int(0) if harvested_max | int(0) > 0
               else ((extruder_temp + 10) | round | int if extruder_temp > 0
               else states('input_number.nfc_temp_max_' ~ (slug if slug in known_slugs else 'default')) | float(240) | round | int)) }}
      # RECORDS FIRST, PRINTER LAST (reordered 2026-06-12 after the empty-
      # tray incident): the Bambuddy + Spoolman bookkeeping below is fast
      # (~3 s) and reliable, while the printer push is slow and depends on
      # physical state. With the push at the end, a superseded run (mode:
      # restart), a Cancel, or a failed push can never strand the records.
      # Mirror this assignment in Bambuddy's own AMS-slot tracking table
      # (separate local DB; Spoolman's spool.location is untouched).
      # printer_id from secrets.yaml (spooltap_printer_id). ams_id: 0=left,
      # 1=right. tray_id is 0-indexed (tray_N -> tray_id N-1).
      - variables:
          bambuddy_printer_id: "{{ states('input_number.spooltap_printer_id') | int(0) }}"
          # External spool = ams_id 255 / tray_id 0 in Bambuddy's model
          # (live-verified). AMS units: 0 = left, 1 = right; tray 0-indexed.
          bambuddy_ams_id: "{{ 255 if slot == 'external' else (0 if slot.split('_')[0] == 'left' else 1) }}"
          bambuddy_tray_id: "{{ 0 if slot == 'external' else (slot.split('_')[1] | int(1)) - 1 }}"
      # Bambuddy's table could be keyed by slot or by spool (undocumented),
      # so cover both: drop this spool's existing assignment anywhere (in
      # case it's "in" a different slot per Bambuddy), and drop whatever
      # spool currently occupies the target slot (in case it's a different
      # spool). Either DELETE is a no-op if nothing matches. Occupant
      # lookup uses the /all listing because the single-slot GET cannot
      # query ams_id 255 (external).
      - action: rest_command.bambuddy_unassign_spool
        data:
          spool_id: "{{ spool_id }}"
        response_variable: unassign_self
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (unassign_self is defined and unassign_self.status | default(0) in [200, 204, 404]) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Bambuddy to start the assignment for spool {{ spool_id }} — nothing changed. Re-scan the pair."
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_pending_slot
            data:
              value: ""
          - stop: "bambuddy unassign(self) failed"
      - action: rest_command.bambuddy_get_all_assignments
        response_variable: bambuddy_table
        continue_on_error: true
      - variables:
          slot_occupant: >-
            {%- set ns = namespace(found=0) -%}
            {%- if bambuddy_table is defined and bambuddy_table.status | default(0) == 200 -%}
              {%- for a in bambuddy_table.content -%}
                {%- if a.printer_id == bambuddy_printer_id | int
                      and a.ams_id == bambuddy_ams_id | int
                      and a.tray_id == bambuddy_tray_id | int -%}
                  {%- set ns.found = a.spoolman_spool_id | int(0) -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.found }}
      - if:
          - condition: template
            value_template: "{{ slot_occupant | int(0) > 0 and slot_occupant | int(0) != spool_id | int(0) }}"
        then:
          - action: rest_command.bambuddy_unassign_spool
            data:
              spool_id: "{{ slot_occupant }}"
            response_variable: unassign_occ
            continue_on_error: true
          - if:
              - condition: template
                value_template: "{{ not (unassign_occ is defined and unassign_occ.status | default(0) in [200, 204, 404]) }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: "⚠ Couldn't update Bambuddy's slot table for AMS {{ slot }} — nothing pushed, Spoolman unchanged. Re-scan the pair."
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_pending_slot
                data:
                  value: ""
              - stop: "bambuddy unassign(occupant) failed"
      - action: rest_command.bambuddy_assign_slot
        data:
          body: >
            {{ {'spoolman_spool_id': spool_id | int,
                'printer_id': bambuddy_printer_id,
                'ams_id': bambuddy_ams_id,
                'tray_id': bambuddy_tray_id} | to_json }}
        response_variable: assign_resp
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (assign_resp is defined and assign_resp.status | default(0) in [200, 201]) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Bambuddy didn't record the assignment for spool {{ spool_id }} — nothing pushed to the printer, Spoolman unchanged. Re-scan the pair."
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_pending_slot
            data:
              value: ""
          - stop: "bambuddy assign failed"
      # Clear nfc_active_tray on whichever spool previously claimed this slot,
      # so Phase B's lookup never reports two spools "in" the same tray.
      - variables:
          prev_spool_id: >-
            {%- set ns = namespace(found=0) -%}
            {%- for s in states.sensor
                 | selectattr('entity_id', 'search', '_extra_nfc_active_tray$')
                 | selectattr('state', 'eq', slot) -%}
              {%- set sid = s.object_id.split('_')[2] | int(0) -%}
              {%- if sid != spool_id | int(0) -%}
                {%- set ns.found = sid -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.found -}}
      - if:
          - condition: template
            value_template: "{{ prev_spool_id | int(0) > 0 }}"
        then:
          - action: rest_command.spoolman_get_spool
            data:
              spool_id: "{{ prev_spool_id }}"
            response_variable: prev_spool
            continue_on_error: true
          - if:
              - condition: template
                value_template: "{{ not (prev_spool is defined and prev_spool.status | default(0) == 200) }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: "⚠ Recorded in Bambuddy, but couldn't reach Spoolman to update tray records for spool {{ spool_id }} — re-scan the pair to finish."
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_pending_slot
                data:
                  value: ""
              - stop: "spoolman get failed (prev_spool)"
          - variables:
              prev_extra: >
                {{ (prev_spool.content.extra | default({}))
                   | combine({'nfc_active_tray': '""'}) }}
          - action: rest_command.spoolman_patch_spool
            data:
              spool_id: "{{ prev_spool_id }}"
              body: "{{ {'extra': prev_extra} | to_json }}"
            response_variable: prev_patch
            continue_on_error: true
          - if:
              - condition: template
                value_template: "{{ not (prev_patch is defined and prev_patch.status | default(0) == 200) }}"
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: "⚠ Recorded in Bambuddy, but couldn't clear the old tray on spool {{ prev_spool_id }} — re-scan the pair to fix."
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_pending_slot
                data:
                  value: ""
              - stop: "spoolman patch failed (prev_spool)"
      - variables:
          new_extra: >
            {{ (spool.content.extra | default({}))
               | combine({'nfc_active_tray': '"' ~ slot ~ '"'}) }}
      - action: rest_command.spoolman_patch_spool
        data:
          spool_id: "{{ spool_id }}"
          body: "{{ {'extra': new_extra} | to_json }}"
        response_variable: newtray_patch
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (newtray_patch is defined and newtray_patch.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Recorded in Bambuddy, but Spoolman didn't save the active tray for spool {{ spool_id }} — re-scan the pair to fix."
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_pending_slot
            data:
              value: ""
          - stop: "spoolman patch failed (new tray)"
      # Refresh sensor values via coordinator poll (cheap), NOT a config-entry
      # reload. All spools carry materialized nfc extras (2026-06-12), so the
      # sensor always exists; the reload survives only as the brand-new-spool
      # fallback. Per-assignment reloads caused the 2026-06-12 storm incident
      # (websocket floods = "connection failed", starved bambu_lab MQTT =
      # set_filament timeouts = failed pushes).
      # NOTE: `entity_id not in states` is unreliable here (always True) — use
      # explicit entity_id membership against the sensor list instead.
      - if:
          - condition: template
            value_template: >
              {{ ('sensor.spoolman_spool_' ~ spool_id ~ '_extra_nfc_active_tray')
                 not in (states.sensor | map(attribute='entity_id') | list) }}
        then:
          - action: homeassistant.reload_config_entry
            data:
              entry_id: !secret spooltap_spoolman_config_entry_id
        else:
          - action: homeassistant.update_entity
            target:
              entity_id: "sensor.spoolman_spool_{{ spool_id }}_extra_nfc_active_tray"
      # Bookkeeping is DONE — clear the pending slot now so a follow-up
      # scan-pair starts clean even if the printer phase below is
      # superseded or cancelled.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_pending_slot
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: >
            Assigned Spool #{{ spool_id }} → AMS {{ slot_disp }} (records synced) —
            configuring printer…
      # --- PRINTER PHASE (slow, physical-world dependent) ----------------
      # Tray entity must be available before a hardware write.
      # NOTE: `entity_id in states` is unreliable on this HA build — use
      # has_value().
      - if:
          - condition: template
            value_template: "{{ not has_value(tray_entity) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >
                Assigned Spool #{{ spool_id }} → AMS {{ slot_disp }} (records synced)
                — ⚠ tray sensor unavailable; printer push skipped. Re-scan the
                pair once the printer is back online.
          - stop: "tray entity unavailable"
      # Empty AMS slot detected. WAS: wait_template for up to 2 min on the
      # AMS to detect filament — which froze SpoolTap during the wait and
      # produced the "sits at trying" UX (live 2026-06-15). NOW: write a
      # deferred intent to nfc_queued_assign (slot|tag_uid|epoch) and STOP
      # the script. The records phase has already run, so Bambuddy +
      # Spoolman bookkeeping is in place. When the user physically loads
      # filament, automation.nfc_empty_slot_queue_watcher re-fires this
      # script via the normal Phase A dispatch path (mode:restart makes
      # the re-entry safe; records re-run idempotently).
      # SKIPPED for external spool: its "Empty" state is profile-derived
      # (not physical detection) — the configure push is what fixes it.
      - if:
          - condition: template
            value_template: "{{ slot != 'external' and is_state(tray_entity, 'Empty') }}"
        then:
          # Refuse to queue mid-print. A deferred dequeue mid-job would
          # push setting_id changes to the running slot (live state on
          # ams_filament_setting is bad form mid-extrusion).
          - if:
              - condition: template
                value_template: >-
                  {{ states(states('input_text.spooltap_print_status_sensor'))
                     in ['running', 'prepare', 'slicing', 'pause'] }}
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: >-
                    ⚠ Print in progress — won't queue an empty-slot
                    assignment for {{ slot }} mid-print. Try again after
                    the current job finishes.
              - stop: "refused: print in progress"
          # Build a friendly status label; fall back to spool # + material
          # if the Spoolman composite sensor is unavailable.
          - variables:
              filament_label: >-
                {%- set fname = states('sensor.spoolman_spool_' ~ spool_id ~ '_filament_name') -%}
                {{- fname if fname not in ['', 'unknown', 'unavailable']
                   else ('Spool #' ~ spool_id ~ ' (' ~ material ~ ')') -}}
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_queued_assign
            data:
              value: "{{ slot }}|{{ tag }}|{{ now().timestamp() | int }}"
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >-
                Queued — Assign {{ filament_label }} to AMS {{ slot_disp }} when filament is detected.
          - stop: "queued — awaiting physical load"
      # Persist live-harvested temps into the filament record so every
      # future assignment of this filament uses them directly.
      - if:
          - condition: template
            value_template: "{{ harvest_ok }}"
        then:
          - action: rest_command.spoolman_patch_filament
            data:
              filament_id: "{{ spool.content.filament.id }}"
              body: >-
                {{ {'extra': (spool.content.filament.extra | default({}))
                     | combine({'nfc_temp_min': nozzle_temp_min | string,
                                'nfc_temp_max': nozzle_temp_max | string})} | to_json }}
            continue_on_error: true
      # Push with VERIFY + RETRY — via Bambuddy's slot-configure (NOT
      # bambu_lab.set_filament, which cannot carry setting_id: without the
      # cloud preset id the printer silently drops uncached custom P-codes
      # while keeping color/type — the tray then LOOKS right on the tile
      # but is profile-less in detail views and invisible to the slicer.
      # Live-proven 2026-06-12: bare push bounced post-power-cycle, the
      # same code + setting_id stuck instantly). Read the tray back after
      # each attempt and retry up to 3 tries before reporting honestly.
      - repeat:
          sequence:
            - action: rest_command.bambuddy_configure_slot
              continue_on_error: true
              data:
                printer_id: "{{ bambuddy_printer_id }}"
                ams_id: "{{ bambuddy_ams_id }}"
                tray_id: "{{ bambuddy_tray_id }}"
                tray_info_idx: "{{ tray_info_idx }}"
                tray_type: "{{ material }}"
                tray_color: "{{ color_hex }}FF"
                temp_min: "{{ nozzle_temp_min }}"
                temp_max: "{{ nozzle_temp_max }}"
                setting_id: "{{ setting_idx if used_profile else '' }}"
            # Exits the moment the tray sensor reflects the pushed code
            # (typically 1-3 s); the timeout only bites on a dropped push.
            - wait_template: "{{ state_attr(tray_entity, 'filament_id') == tray_info_idx }}"
              timeout: "00:00:10"
          until:
            - condition: template
              value_template: >-
                {{ state_attr(tray_entity, 'filament_id') == tray_info_idx
                   or repeat.index >= 3 }}
      - variables:
          push_verified: "{{ state_attr(tray_entity, 'filament_id') == tray_info_idx }}"
      # Unknown material with no mapped profile: used the safe "default"
      # range — flag for review. (A mapped profile suppresses this; its
      # code+temps are already authoritative.)
      - if:
          - condition: template
            value_template: >-
              {{ effective_slug == 'default' and slug not in known_slugs
                 and not used_profile }}
        then:
          - action: persistent_notification.create
            data:
              notification_id: "nfc_new_material_{{ slug }}"
              title: "SpoolTap: New filament material detected"
              message: >
                Spool {{ spool_id }} uses material "{{ material }}", which has
                no dedicated temperature defaults yet. Used the generic safe
                range ({{ nozzle_temp_min }}-{{ nozzle_temp_max }}°C). Add
                input_number.nfc_temp_min_{{ slug }} and
                input_number.nfc_temp_max_{{ slug }} to the SpoolTap package to
                set proper defaults for "{{ material }}".
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: >
            Assigned Spool #{{ spool_id }} ({{ material }}) → AMS {{ slot_disp }}
            as {{ tray_info_idx }}{{ '' if used_profile else ' [GENERIC fallback — run Sync Filament Profiles]' }}
            ({{ nozzle_temp_min }}-{{ nozzle_temp_max }}°C{{ ', temps harvested from tray' if harvest_ok else '' }}),
            Bambuddy slot synced{{ ' — ✓ printer confirmed' if push_verified
            else ' — ⚠ printer did NOT confirm (AMS busy?) — re-scan the pair once the AMS is idle' }}

  # Phase B: scanned a REGISTERED spool with no slot pending -> load it into
  # the Modify Spool panel (weight, name, type, weigh-in — the full
  # inventory workflow). All the heavy lifting, including the archived
  # check, lives in nfc_load_spool_for_modify.
  nfc_lookup_spool:
    alias: "NFC: Look up scanned Spool (weight notify)"
    icon: mdi:scale-balance
    mode: single
    sequence:
      - variables:
          tag: "{{ states('input_text.nfc_last_scanned') }}"
          spool_id: >-
            {%- set ns = namespace(found=0) -%}
            {%- for s in states.sensor
                 | selectattr('entity_id', 'search', '_extra_nfc_tag$')
                 | selectattr('state', 'eq', tag) -%}
              {%- set ns.found = s.object_id.split('_')[2] | int(0) -%}
            {%- endfor -%}
            {{- ns.found -}}
      - condition: template
        value_template: "{{ spool_id | int(0) > 0 }}"
      - action: script.nfc_load_spool_for_modify
        data:
          spool_id: "{{ spool_id }}"

  # Phase B: write the edited remaining weight back to Spoolman. PATCH
  # remaining_weight is an accepted writable field per Spoolman's API schema.
  # ASSUMPTION (unconfirmed — the reversible test write was blocked by the
  # permission gate): the value STICKS and Spoolman back-computes
  # used_weight = initial - remaining. FALLBACK if it doesn't stick (reads
  # back recomputed from the old used_weight): PATCH used_weight =
  # initial_weight - new_weight instead. Confirm on the first real write.
  nfc_update_remaining_weight:
    alias: "NFC: Set Remaining weight (save net)"
    icon: mdi:scale
    mode: single
    sequence:
      - variables:
          spool_id: "{{ states('input_number.nfc_weight_spool_id') | int(0) }}"
          new_weight: "{{ states('input_number.nfc_weight_edit') | float(0) }}"
      - condition: template
        value_template: "{{ spool_id > 0 }}"
      - action: rest_command.spoolman_patch_spool
        data:
          spool_id: "{{ spool_id }}"
          body: "{{ {'remaining_weight': new_weight} | to_json }}"
        response_variable: remwt_patch
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (remwt_patch is defined and remwt_patch.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Spoolman didn't save the weight for spool {{ spool_id }} — not recorded, try again."
          - stop: "spoolman patch failed (update remaining)"
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "Updated Spool #{{ spool_id }} remaining weight → {{ new_weight }}g"

  # Phase B / archived resolver: a scanned tag matched no ACTIVE spool and no
  # AMS slot. Fetch all spools (incl. archived) and classify the tag so the
  # user gets a meaningful message instead of a silent no-op.
  nfc_resolve_unmatched:
    alias: "NFC: Resolve unmatched Tag"
    icon: mdi:help-rhombus-outline
    mode: single
    sequence:
      - variables:
          tag: "{{ states('input_text.nfc_last_scanned') }}"
      - condition: template
        value_template: "{{ tag not in ['', 'unknown', 'unavailable'] }}"
      - action: rest_command.spoolman_get_all_spools
        response_variable: allspools
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ not (allspools is defined and allspools.status | default(0) == 200) }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "⚠ Couldn't reach Spoolman to check the scanned tag — try again."
          - stop: "spoolman get_all failed (resolve)"
      - variables:
          hit: >-
            {%- set ns = namespace(found={}) -%}
            {%- for s in allspools.content -%}
              {%- if (s.extra.nfc_tag | default('')) == '"' ~ tag ~ '"' -%}
                {%- set ns.found = {'id': s.id, 'archived': (s.archived | default(false)), 'material': (s.filament.material | default('Unknown'))} -%}
              {%- endif -%}
            {%- endfor -%}
            {{- ns.found -}}
      - choose:
          - conditions:
              - "{{ hit.get('id', 0) | int(0) > 0 and hit.get('archived', false) }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: "Scanned Spool #{{ hit.id }} ({{ hit.material }}) is ARCHIVED. Not assigned. Restore it in Spoolman if still in use."
              - action: persistent_notification.create
                data:
                  notification_id: "nfc_archived_{{ hit.id }}"
                  title: "SpoolTap: Tag scanned for archived Spool"
                  message: >-
                    The scanned tag belongs to spool {{ hit.id }}
                    ({{ hit.material }}), which is ARCHIVED in Spoolman. It was
                    not assigned to a tray. If this spool is still in use,
                    restore it in Spoolman.
          - conditions:
              - "{{ hit.get('id', 0) | int(0) > 0 }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: "Spool #{{ hit.id }} matched in Spoolman but not in HA — reload the Spoolman integration, then retry."
        default:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "Unrecognized Tag {{ tag }} — turn on Bind Mode to Bind it to a Spool."

  # Panic button: kill any in-flight assignment (incl. mid-retry pushes),
  # clear the pending slot, and reset the scanner so the next scan starts
  # clean. Blanking nfc_last_scanned also means re-scanning the SAME tag
  # immediately works (the dispatch trigger needs a state change).
  nfc_cancel_assignment:
    alias: "NFC: Cancel Assignment"
    icon: mdi:cancel
    mode: single
    sequence:
      - action: script.turn_off
        target:
          entity_id: script.nfc_assign_spool_to_tray
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_pending_slot
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_last_scanned
        data:
          value: ""
      # Also clear any queued empty-slot intent so the watcher won't
      # fire on the next physical tray load.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_queued_assign
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "Assignment cancelled — Pending Slot cleared, scanner reset"

  # Cloud profile sync: match Spoolman filaments that have no nfc_tray_idx
  # yet against the user's custom Bambu Studio filament library (P-code ->
  # name map, served by Bambuddy from the linked Bambu cloud account) and
  # write the match into the filament-level extra. Runs nightly (automation
  # nfc_profile_sync_daily) and from the dashboard "Sync Filament Profiles"
  # button. Conservative matcher: vendor must appear, the material must be
  # an exact profile-name token (so PLA never matches a PLA+ profile), and
  # every profile descriptor word ("matte", "silk", "hs"...) must appear in
  # the filament name. Anything ambiguous stays unmatched and is reported
  # for manual mapping in Spoolman's UI — a wrong silent guess would push
  # the wrong identity to the printer forever.
  nfc_sync_filament_profiles:
    alias: "NFC: Sync Filament Profiles"
    icon: mdi:cloud-sync
    mode: single
    sequence:
      - action: rest_command.bambuddy_get_filament_id_map
        response_variable: idmap
        continue_on_error: true
      - if:
          - condition: template
            value_template: >-
              {{ idmap is not defined or idmap.status | default(0) != 200
                 or idmap.content is not mapping }}
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "Profile sync: Bambuddy cloud filament map unavailable — skipped"
          - stop: "cloud map unavailable"
      # Cloud preset variants — supplies setting_id per matched profile
      # (what makes a P-code stick on the printer). Degrades gracefully:
      # without it, matches still get their code, just no setting_id.
      - action: rest_command.bambuddy_get_cloud_filaments
        response_variable: cloudfils
        continue_on_error: true
      - action: rest_command.spoolman_get_all_filaments
        response_variable: fils
        continue_on_error: true
      - if:
          - condition: template
            value_template: "{{ fils is not defined or fils.status | default(0) != 200 }}"
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "Profile sync: Spoolman filament list unavailable — skipped"
          - stop: "spoolman unavailable"
      # NOTE: do NOT copy cloudfils.content into a variable — the endpoint
      # returns Bambu's ENTIRE preset catalog (~1800 entries, ~290 KB),
      # which blows HA's 256 KB template-output ceiling (live failure
      # 2026-06-12 during the first new-filament run). It is referenced
      # inline inside the matcher below instead; only the small result
      # dict ever gets rendered.
      - variables:
          result: >-
            {%- set cvs = cloudfils.content
                  if (cloudfils is defined and cloudfils.status | default(0) == 200
                      and cloudfils.content is not string and cloudfils.content is iterable)
                  else [] -%}
            {%- set ns = namespace(todo=[], unmatched=[], fixsid=[]) -%}
            {%- for f in fils.content -%}
              {%- set cur = (f.extra | default({})).get('nfc_tray_idx', '') | replace('"', '') | trim -%}
              {%- set fvendor = ((f.vendor | default({})).name | default('') | lower) -%}
              {#- Bambu Lab filaments are RFID/Bambuddy-managed — never pushed
                  by us, so they are not sync candidates. -#}
              {%- if cur in ['', 'null'] and fvendor != 'bambu lab' -%}
                {%- set fname = (f.name | default('') | lower) -%}
                {%- set fmat = (f.material | default('') | lower) -%}
                {%- set best = namespace(code='', score=-1) -%}
                {%- for code, pname in idmap.content.items() -%}
                  {%- set pl = pname | lower -%}
                  {%- set ptokens = pl.split() -%}
                  {%- set brand = ptokens[0] -%}
                  {%- set vendor_ok = (brand in fvendor)
                        or (fvendor != '' and fvendor in pl)
                        or (brand in fname) -%}
                  {%- set type_ok = fmat != '' and fmat in ptokens -%}
                  {#- Descriptors = profile-name tokens minus brand/material/
                      noise words; ALL must appear in the filament name. -#}
                  {%- set desc = ptokens | reject('in', [brand, fmat, 'basic', 'gen', '2', 'tech']) | list -%}
                  {%- set hit = desc | select('in', fname) | list | length -%}
                  {%- if vendor_ok and type_ok and hit == desc | length and hit > best.score -%}
                    {%- set best.code = code -%}
                    {%- set best.score = hit -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set label = ((f.vendor | default({})).name | default('?')) ~ ' ' ~ (f.name | default('?')) -%}
                {%- if best.code != '' -%}
                  {#- Resolve the cloud setting_id for the matched profile;
                      prefer the 0.4-nozzle variant, else first variant. -#}
                  {%- set pname2 = idmap.content[best.code] -%}
                  {%- set sidns = namespace(sid='', exact=false) -%}
                  {%- for cf in cvs -%}
                    {%- set cn = cf.name | default('') -%}
                    {%- if not sidns.exact and cn.startswith(pname2 ~ ' @') -%}
                      {%- if (states('input_text.spooltap_nozzle') ~ ' nozzle') in cn -%}
                        {%- set sidns.sid = cf.setting_id -%}
                        {%- set sidns.exact = true -%}
                      {%- elif sidns.sid == '' -%}
                        {%- set sidns.sid = cf.setting_id -%}
                      {%- endif -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set ns.todo = ns.todo + [{'id': f.id, 'label': label, 'code': best.code, 'sid': sidns.sid, 'extra': f.extra | default({})}] -%}
                {%- else -%}
                  {#- No safe match: collect same-vendor cloud profiles as
                      CANDIDATES (code + name) so the dashboard workbench
                      can offer copy-paste choices instead of a dead end. -#}
                  {%- set cnd = namespace(items=[]) -%}
                  {%- for code, pname in idmap.content.items() -%}
                    {%- set pl = pname | lower -%}
                    {%- set brand = pl.split()[0] -%}
                    {%- if (cnd.items | length) < 5
                          and ((brand in fvendor) or (fvendor != '' and fvendor in pl) or (brand in fname)) -%}
                      {%- set cnd.items = cnd.items + [{'code': code, 'name': pname}] -%}
                    {%- endif -%}
                  {%- endfor -%}
                  {%- set ns.unmatched = ns.unmatched + [{'id': f.id, 'label': label, 'candidates': cnd.items}] -%}
                {%- endif -%}
              {%- elif cur != '' and cur != 'null' and fvendor != 'bambu lab'
                    and cur in (idmap.content | default({})) -%}
                {#- The user-DIY path: any custom P-code present in Spoolman
                    gets its setting_id RESOLVED AND VALIDATED here — covers
                    both a freshly-pasted code (empty sid) and a re-pointed
                    code whose stale sid still belongs to the OLD profile
                    (live incident: filament #3 re-pointed to the new PLA+
                    profile kept its ELEGOO-Basic sid). Paste/change the
                    code, run Sync, done. -#}
                {%- set pname3 = idmap.content[cur] -%}
                {%- set sidns2 = namespace(sid='', exact=false) -%}
                {%- for cf in cvs -%}
                  {%- set cn = cf.name | default('') -%}
                  {%- if not sidns2.exact and cn.startswith(pname3 ~ ' @') -%}
                    {%- if (states('input_text.spooltap_nozzle') ~ ' nozzle') in cn -%}
                      {%- set sidns2.sid = cf.setting_id -%}
                      {%- set sidns2.exact = true -%}
                    {%- elif sidns2.sid == '' -%}
                      {%- set sidns2.sid = cf.setting_id -%}
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
                {%- set cur_sid = (f.extra | default({})).get('nfc_setting_id', '') | replace('"', '') | trim -%}
                {%- if sidns2.sid != '' and sidns2.sid != cur_sid -%}
                  {%- set ns.fixsid = ns.fixsid + [{'id': f.id, 'sid': sidns2.sid, 'extra': f.extra | default({})}] -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ {'todo': ns.todo, 'unmatched': ns.unmatched, 'fixsid': ns.fixsid} }}
      - repeat:
          for_each: "{{ result.todo }}"
          sequence:
            - action: rest_command.spoolman_patch_filament
              data:
                filament_id: "{{ repeat.item.id }}"
                body: >-
                  {{ {'extra': repeat.item.extra
                       | combine({'nfc_tray_idx': '"' ~ repeat.item.code ~ '"'})
                       | combine({'nfc_setting_id': '"' ~ repeat.item.sid ~ '"'} if repeat.item.sid else {})} | to_json }}
      # Fill missing setting_ids for manually-pasted P-codes (user-DIY path).
      - repeat:
          for_each: "{{ result.fixsid }}"
          sequence:
            - action: rest_command.spoolman_patch_filament
              data:
                filament_id: "{{ repeat.item.id }}"
                body: >-
                  {{ {'extra': repeat.item.extra
                       | combine({'nfc_setting_id': '"' ~ repeat.item.sid ~ '"'})} | to_json }}
      - if:
          - condition: template
            value_template: "{{ result.unmatched | length > 0 }}"
        then:
          - action: persistent_notification.create
            data:
              notification_id: nfc_profile_sync_unmatched
              title: "NFC: Filaments without a printer profile"
              message: >-
                No cloud filament profile matched:
                {{ result.unmatched | map(attribute='label') | join('; ') }}.
                See the Profile Sync card on the SpoolTap dashboard (Inventory
                tab) for copyable candidate codes, or create a profile in Bambu
                Studio (NOTE:
                the printer must learn a NEW profile once — briefly connect
                it to the cloud, or assign the profile to any tray from the
                slicer while connected).
      # Feed the dashboard workbench card (fires on EVERY run, including
      # zero-unmatched, so the card clears itself).
      - event: nfc_profile_sync_report
        event_data:
          unmatched: "{{ result.unmatched }}"
          mapped: "{{ result.todo | length }}"
          sid_filled: "{{ result.fixsid | length }}"
      # Materialize nfc_tag/nfc_active_tray extras on any spool missing them
      # (i.e. spools added since the 2026-06-12 batch). Keeping every spool's
      # extra sensors pre-created is what lets bind/assign run WITHOUT a
      # config-entry reload (see the storm-incident notes in those scripts).
      - action: rest_command.spoolman_get_all_spools
        response_variable: allspools
        continue_on_error: true
      - variables:
          mat_todo: >-
            {%- set ns = namespace(items=[]) -%}
            {%- if allspools is defined and allspools.status | default(0) == 200 -%}
              {%- for s in allspools.content -%}
                {%- if not (s.archived | default(false)) -%}
                  {%- set ex = s.extra | default({}) -%}
                  {%- if 'nfc_tag' not in ex or 'nfc_active_tray' not in ex -%}
                    {%- set ns.items = ns.items + [{'id': s.id, 'extra': ex}] -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
            {{ ns.items }}
      - repeat:
          for_each: "{{ mat_todo }}"
          sequence:
            - action: rest_command.spoolman_patch_spool
              data:
                spool_id: "{{ repeat.item.id }}"
                body: >-
                  {{ {'extra': repeat.item.extra
                       | combine({'nfc_tag': repeat.item.extra.get('nfc_tag', '""'),
                                  'nfc_active_tray': repeat.item.extra.get('nfc_active_tray', '""')})} | to_json }}
      # New spools need one reload to create their sensors — do it HERE
      # (nightly/manual, off the assignment hot path), not during binds.
      - if:
          - condition: template
            value_template: "{{ mat_todo | length > 0 }}"
        then:
          - action: homeassistant.reload_config_entry
            data:
              entry_id: !secret spooltap_spoolman_config_entry_id
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: >-
            {{ ('Profile sync: mapped ' ~ (result.todo | length) ~ ' filament(s)'
                ~ ((': ' ~ (result.todo | map(attribute='label') | join(', '))) if result.todo | length else '')
                ~ ((' — ' ~ (result.unmatched | length) ~ ' unmatched (see notification)') if result.unmatched | length else '')
                ~ (' — all filaments already mapped' if not (result.todo | length or result.unmatched | length) else '')
                ~ ((' — setting_id filled for ' ~ (result.fixsid | length)) if result.fixsid | length else '')
                ~ ((' — materialized ' ~ (mat_todo | length) ~ ' new spool(s)') if mat_todo | length else ''))[:250] }}

  # ═════════════════════════════════════════════════════════════
  # Layer 2: BB ↔ Spoolman Slot-Assignment Reconciler
  # ═════════════════════════════════════════════════════════════
  # Cause of the right_2/3/4 silent-loss incident (2026-06-15):
  # Bambuddy's bambu_mqtt service auto-evicts slot-assignment rows
  # when the printer reports tray state=10 ("not loaded") over MQTT,
  # regardless of how the assignment was created. Spoolman doesn't
  # listen to MQTT so it kept its records — we have a durable engine
  # but BB silently undid our writes. This script reconciles.
  #
  # ARCHITECTURE (CQRS-flavored):
  #   - Bambuddy = the rich UI you live in (print queue, archive, etc.)
  #   - Spoolman = durable engine / System of Record
  #   - This script = the IO layer that propagates both directions
  #
  # FLOW each cycle:
  #   1. Master switch + shape validation
  #   2. Read BB /all (rest_command.bambuddy_get_all_assignments)
  #   3. Build sm_rows from sensor.spoolman_spool_*_extra_nfc_active_tray
  #   4. Defend against Spoolman cascade (sensor count threshold)
  #   5. Diff into bb_only / sm_only / conflict_keys
  #   6. Heal BB_ONLY  → PATCH Spoolman (user added in BB UI)
  #   7. Heal SM_ONLY  → POST to BB (eviction recovery; storm-dampened)
  #   8. Heal CONFLICTS → BB-wins per O2 (PATCH Spoolman + clear old)
  #   9. Recovery ack if fail_count was non-zero before this success
  #
  # Decisions locked 2026-06-15: O1=5min O2=BB-wins O3=no-gate
  # O4=silent-startup O5=leave-archived O6=Inventory-tab button
  # O7=heal-log card + opt-in phone notify boolean
  bb_reconciler_cycle:
    alias: "BB Reconciler: one heal cycle"
    icon: mdi:sync-circle
    # single (not restart): if a cycle is running when the next
    # trigger fires, we want to FINISH it cleanly rather than abort
    # mid-heal. The 5-min poll gives plenty of slack. max_exceeded
    # silent so a flurry of triggers doesn't pollute the log.
    mode: single
    max_exceeded: silent
    sequence:
      # ── 1. Master switch ──
      # Gating happens IN THE AUTOMATIONS (poll/event/startup) so the
      # manual button can intentionally bypass the switch and force a
      # cycle. No in-script condition: the script trusts its caller.
      # ── 2. Fetch BB slot table ──
      - action: rest_command.bambuddy_get_all_assignments
        response_variable: bb_response
        continue_on_error: true
      # ── 3. Shape validation + failure handling ──
      # Reject anything that isn't {status: 200, content: [list of dicts]}.
      # is iterable + not mapping + not string defends against
      # response shape drift on the BB daily channel.
      - if:
          - condition: template
            value_template: >-
              {{ not (bb_response is defined
                      and bb_response.status | default(0) == 200
                      and bb_response.content is iterable
                      and bb_response.content is not mapping
                      and bb_response.content is not string) }}
        then:
          - action: input_number.set_value
            target:
              entity_id: input_number.bb_reconciler_fail_count
            data:
              value: "{{ states('input_number.bb_reconciler_fail_count') | int(0) + 1 }}"
          - if:
              - condition: numeric_state
                entity_id: input_number.bb_reconciler_fail_count
                above: 2
            then:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: >-
                    ⚠ BB reconciler: Bambuddy unreachable or returned
                    bad response — {{ states('input_number.bb_reconciler_fail_count') }} consecutive
                    cycles failed. Check addon status.
          - stop: "BB fetch failed"
      # ── 4. Spoolman cascade defense ──
      # When Spoolman reload_config_entry fires, ALL spool sensors go
      # unavailable for several seconds. A cycle that races that
      # window would see "no Spoolman bindings" and unassign
      # everything from BB. Sensor count below threshold = cascade in
      # progress; defer to next cycle.
      - variables:
          spoolman_sensor_count: >-
            {{ states.sensor
               | selectattr('entity_id', 'search', '_extra_nfc_active_tray$')
               | rejectattr('state', 'in', ['unknown', 'unavailable'])
               | list | count }}
      - if:
          - condition: template
            value_template: "{{ spoolman_sensor_count < 10 }}"
        then:
          - stop: "Spoolman cascade in progress — deferring"
      # ── 5. Build slot ↔ (ams, tray) maps + row lists ──
      - variables:
          slot_to_at:
            left_1: [0, 0]
            left_2: [0, 1]
            left_3: [0, 2]
            left_4: [0, 3]
            right_1: [1, 0]
            right_2: [1, 1]
            right_3: [1, 2]
            right_4: [1, 3]
            external: [255, 0]
          at_to_slot:
            "0_0": left_1
            "0_1": left_2
            "0_2": left_3
            "0_3": left_4
            "1_0": right_1
            "1_1": right_2
            "1_2": right_3
            "1_3": right_4
            "255_0": external
      - variables:
          # BB rows for our printer (id=1) only. Key = "ams_tray".
          bb_rows: >-
            {%- set ns = namespace(rows=[]) -%}
            {%- for r in bb_response.content -%}
              {%- if r.printer_id | default(0) == states('input_number.spooltap_printer_id') | int(0) -%}
                {%- set key = (r.ams_id | string) ~ '_' ~ (r.tray_id | string) -%}
                {%- set ns.rows = ns.rows + [{
                  'key': key,
                  'ams': r.ams_id,
                  'tray': r.tray_id,
                  'spool_id': r.spoolman_spool_id | int(0),
                  'slot': at_to_slot.get(key, '')
                }] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.rows }}
          # SM bindings derived from sensor.spoolman_spool_*_extra_nfc_active_tray
          # whose state is a recognized slot label.
          sm_rows: >-
            {%- set ns = namespace(rows=[]) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', '_extra_nfc_active_tray$') -%}
              {%- if s.state not in ['', 'unknown', 'unavailable'] and s.state in slot_to_at -%}
                {%- set sid = s.object_id.split('_')[2] | int(0) -%}
                {%- set at = slot_to_at[s.state] -%}
                {%- set key = (at[0] | string) ~ '_' ~ (at[1] | string) -%}
                {%- if sid > 0 -%}
                  {%- set ns.rows = ns.rows + [{
                    'key': key,
                    'ams': at[0],
                    'tray': at[1],
                    'spool_id': sid,
                    'slot': s.state
                  }] -%}
                {%- endif -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.rows }}
      # ── 5b. Dedup: enforce one-spool-one-slot (oscillation fix) ──
      # A spool with >1 BB row (e.g. an AMS slot + a stale `external` ghost from
      # moving the spool out of external) makes the BB_ONLY heal (step 7) flap
      # Spoolman's nfc_active_tray between the two slots every cycle → the
      # printer slot drops Empty. Resolve STRUCTURALLY by ams_id (the tray
      # sensor can't arbitrate: 3rd-party spools have tag_uid=0 and a
      # profile-derived `state` that lies):
      #   * exactly 1 AMS row + the external row → keep the AMS slot. external
      #     (ams 255) is the unverifiable transient leftover by construction.
      #     bambuddy_unassign_spool deletes ALL the spool's BB rows (its DELETE
      #     is by-spool, no slot filter — confirmed from BB source), then PATCH
      #     Spoolman to the keeper, and prune the spool from bb_rows so the
      #     keeper flows through the SM_ONLY heal below at ONE consistent slot
      #     (re-asserting assign+configure; the storm guard then backstops any
      #     recurrence — which the original bug evaded only because BB_ONLY
      #     alternated slots).
      #   * >=2 AMS rows → a real spool can't be in two trays; don't guess.
      #     Freeze it (drop from both bb_rows and sm_rows, no heal touches it
      #     this cycle) + ⚠. Fail-loud on true ambiguity.
      - variables:
          # spool_ids appearing in more than one BB row.
          dup_spool_ids: >-
            {%- set counts = bb_rows | map(attribute='spool_id') | list -%}
            {%- set ns = namespace(ids=[]) -%}
            {%- for sid in counts | unique -%}
              {%- if sid | int(0) > 0 and (counts | select('eq', sid) | list | count) > 1 -%}
                {%- set ns.ids = ns.ids + [sid] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.ids }}
          # Per duplicated spool: resolve (keep the lone AMS slot) or freeze.
          dup_plan: >-
            {%- set ns = namespace(plan=[]) -%}
            {%- for sid in dup_spool_ids -%}
              {%- set rows = bb_rows | selectattr('spool_id', 'eq', sid) | list -%}
              {%- set ams_rows = rows | rejectattr('ams', 'eq', 255) | list -%}
              {%- if (ams_rows | count) == 1 -%}
                {%- set k = ams_rows[0] -%}
                {%- set ns.plan = ns.plan + [{'spool_id': sid, 'action': 'resolve',
                     'keeper_slot': k.slot, 'keeper_ams': k.ams, 'keeper_tray': k.tray}] -%}
              {%- else -%}
                {%- set ns.plan = ns.plan + [{'spool_id': sid, 'action': 'freeze'}] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.plan }}
      # Resolve: delete ALL of the spool's BB rows, then PATCH Spoolman to keeper.
      - repeat:
          for_each: "{{ dup_plan | selectattr('action', 'eq', 'resolve') | list }}"
          sequence:
            - variables:
                _spool_id: "{{ repeat.item.spool_id }}"
                _keeper: "{{ repeat.item.keeper_slot }}"
            - action: rest_command.bambuddy_unassign_spool
              data:
                spool_id: "{{ _spool_id }}"
              continue_on_error: true
            - action: rest_command.spoolman_get_spool
              data:
                spool_id: "{{ _spool_id }}"
              response_variable: dspool
              continue_on_error: true
            - if:
                - condition: template
                  value_template: "{{ dspool is defined and dspool.status | default(0) == 200 }}"
              then:
                - variables:
                    dextra: >-
                      {{ (dspool.content.extra | default({}))
                         | combine({'nfc_active_tray': '"' ~ _keeper ~ '"'}) }}
                - action: rest_command.spoolman_patch_spool
                  data:
                    spool_id: "{{ _spool_id }}"
                    body: "{{ {'extra': dextra} | to_json }}"
                  continue_on_error: true
                - event: nfc_reconciler_heal
                  event_data:
                    direction: "DEDUP (kept AMS, dropped ghost)"
                    slot: "{{ _keeper }}"
                    spool_id: "{{ _spool_id | int(0) }}"
                    spool_name: "{{ dspool.content.filament.name | default('spool #' ~ _spool_id) }}"
                    timestamp: "{{ now().isoformat() }}"
      # Freeze: warn on ambiguous (>=2 AMS rows) duplicates; leave them be.
      - repeat:
          for_each: "{{ dup_plan | selectattr('action', 'eq', 'freeze') | list }}"
          sequence:
            - action: input_text.set_value
              target:
                entity_id: input_text.nfc_register_status
              data:
                value: >-
                  ⚠ Spool {{ repeat.item.spool_id }} is registered in 2+ AMS
                  slots at once — can't tell which is real. Reconciler is
                  leaving it alone; re-scan the correct slot to fix.
      # Prune the in-memory snapshots BEFORE the diff so step 7 can't re-heal a
      # ghost: drop every duplicated spool from bb_rows; drop frozen spools from
      # sm_rows; force each resolved spool's sm_rows entry to its keeper slot
      # (so it lands in sm_only → the SM_ONLY heal re-asserts assign+configure).
      - variables:
          # Derive drop-lists INLINE from dup_plan (a prior-step var) so neither
          # reassignment depends on the other within this block (no reliance on
          # intra-block variable evaluation order).
          bb_rows: >-
            {%- set drop = dup_plan | map(attribute='spool_id') | list -%}
            {{ bb_rows | rejectattr('spool_id', 'in', drop) | list }}
          sm_rows: >-
            {%- set fids = dup_plan | selectattr('action', 'eq', 'freeze') | map(attribute='spool_id') | list -%}
            {%- set rids = dup_plan | selectattr('action', 'eq', 'resolve') | map(attribute='spool_id') | list -%}
            {%- set kept = sm_rows | rejectattr('spool_id', 'in', fids + rids) | list -%}
            {%- set ns = namespace(rows=kept) -%}
            {%- for p in dup_plan if p.action == 'resolve' -%}
              {%- set ns.rows = ns.rows + [{
                   'key': (p.keeper_ams | string) ~ '_' ~ (p.keeper_tray | string),
                   'ams': p.keeper_ams, 'tray': p.keeper_tray,
                   'spool_id': p.spool_id, 'slot': p.keeper_slot}] -%}
            {%- endfor -%}
            {{ ns.rows }}
      # ── 6. Compute diff buckets ──
      - variables:
          # Same slot, different spool = conflict. BB-wins per O2.
          conflict_keys: >-
            {%- set ns = namespace(keys=[]) -%}
            {%- for b in bb_rows -%}
              {%- for s in sm_rows -%}
                {%- if b.key == s.key and b.spool_id != s.spool_id -%}
                  {%- set ns.keys = ns.keys + [b.key] -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endfor -%}
            {{ ns.keys }}
          bb_only: >-
            {%- set ns = namespace(rows=[]) -%}
            {%- set sm_keys = sm_rows | map(attribute='key') | list -%}
            {%- for b in bb_rows -%}
              {%- if b.key not in sm_keys -%}
                {%- set ns.rows = ns.rows + [b] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.rows }}
          sm_only: >-
            {%- set ns = namespace(rows=[]) -%}
            {%- set bb_keys = bb_rows | map(attribute='key') | list -%}
            {%- for s in sm_rows -%}
              {%- if s.key not in bb_keys -%}
                {%- set ns.rows = ns.rows + [s] -%}
              {%- endif -%}
            {%- endfor -%}
            {{ ns.rows }}
      # ── 7. Heal BB_ONLY: PATCH Spoolman to match BB ──
      # User added a row in BB UI; mirror to Spoolman's nfc_active_tray.
      - repeat:
          for_each: "{{ bb_only }}"
          sequence:
            - variables:
                _spool_id: "{{ repeat.item.spool_id }}"
                _slot: "{{ repeat.item.slot }}"
            # Skip rows where slot couldn't be derived (unknown ams/tray).
            - if:
                - condition: template
                  value_template: "{{ _spool_id | int(0) > 0 and _slot != '' }}"
              then:
                # Clear any other Spoolman spool currently claiming this
                # slot (the displaced row).
                - variables:
                    prev_spool_id: >-
                      {%- set ns = namespace(found=0) -%}
                      {%- for s in states.sensor
                           | selectattr('entity_id', 'search', '_extra_nfc_active_tray$')
                           | selectattr('state', 'eq', _slot) -%}
                        {%- set sid = s.object_id.split('_')[2] | int(0) -%}
                        {%- if sid > 0 and sid != _spool_id | int(0) -%}
                          {%- set ns.found = sid -%}
                        {%- endif -%}
                      {%- endfor -%}
                      {{ ns.found }}
                - if:
                    - condition: template
                      value_template: "{{ prev_spool_id | int(0) > 0 }}"
                  then:
                    - action: rest_command.spoolman_get_spool
                      data:
                        spool_id: "{{ prev_spool_id }}"
                      response_variable: prev_spool
                      continue_on_error: true
                    - if:
                        - condition: template
                          value_template: "{{ prev_spool is defined and prev_spool.status | default(0) == 200 }}"
                      then:
                        - variables:
                            prev_extra: >-
                              {{ (prev_spool.content.extra | default({}))
                                 | combine({'nfc_active_tray': '""'}) }}
                        - action: rest_command.spoolman_patch_spool
                          data:
                            spool_id: "{{ prev_spool_id }}"
                            body: "{{ {'extra': prev_extra} | to_json }}"
                          continue_on_error: true
                # PATCH the new spool's nfc_active_tray to this slot
                - action: rest_command.spoolman_get_spool
                  data:
                    spool_id: "{{ _spool_id }}"
                  response_variable: spool
                  continue_on_error: true
                - if:
                    - condition: template
                      value_template: "{{ spool is defined and spool.status | default(0) == 200 }}"
                  then:
                    - variables:
                        new_extra: >-
                          {{ (spool.content.extra | default({}))
                             | combine({'nfc_active_tray': '"' ~ _slot ~ '"'}) }}
                        spool_name: "{{ spool.content.filament.name | default('spool #' ~ _spool_id) }}"
                    - action: rest_command.spoolman_patch_spool
                      data:
                        spool_id: "{{ _spool_id }}"
                        body: "{{ {'extra': new_extra} | to_json }}"
                      response_variable: patch_resp
                      continue_on_error: true
                    - if:
                        - condition: template
                          value_template: "{{ patch_resp is defined and patch_resp.status | default(0) == 200 }}"
                      then:
                        - event: nfc_reconciler_heal
                          event_data:
                            direction: "BB→SM"
                            slot: "{{ _slot }}"
                            spool_id: "{{ _spool_id | int(0) }}"
                            spool_name: "{{ spool_name }}"
                            timestamp: "{{ now().isoformat() }}"
      # ── 8. Heal SM_ONLY: POST to BB (eviction recovery) ──
      # With storm dampener: if the SAME row keeps getting evicted
      # cycle after cycle, the printer is genuinely reporting state=10
      # and re-pushing won't stick. After 3 consecutive same-key
      # heals, skip and ⚠ for manual intervention.
      - repeat:
          for_each: "{{ sm_only }}"
          sequence:
            - variables:
                _key: "{{ repeat.item.key }}_{{ repeat.item.spool_id }}"
                _slot: "{{ repeat.item.slot }}"
                _spool_id: "{{ repeat.item.spool_id }}"
                _ams: "{{ repeat.item.ams }}"
                _tray: "{{ repeat.item.tray }}"
            # Storm check: same key + counter >= 3 → skip + warn
            - if:
                - condition: template
                  value_template: >-
                    {{ states('input_text.nfc_storm_key') == _key
                       and states('input_number.bb_reconciler_storm_count') | int(0) >= 3 }}
              then:
                - action: input_text.set_value
                  target:
                    entity_id: input_text.nfc_register_status
                  data:
                    value: >-
                      ⚠ BB keeps evicting {{ _slot }} → spool {{ _spool_id }}
                      after re-push (3+ cycles). Printer may be reporting
                      state=10 for a loaded slot, or filament really isn't
                      there. Manual check needed.
                # Skip this row but continue with others
              else:
                # Update storm key + counter
                - if:
                    - condition: template
                      value_template: "{{ states('input_text.nfc_storm_key') == _key }}"
                  then:
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.bb_reconciler_storm_count
                      data:
                        value: "{{ states('input_number.bb_reconciler_storm_count') | int(0) + 1 }}"
                  else:
                    - action: input_text.set_value
                      target:
                        entity_id: input_text.nfc_storm_key
                      data:
                        value: "{{ _key }}"
                    - action: input_number.set_value
                      target:
                        entity_id: input_number.bb_reconciler_storm_count
                      data:
                        value: 0
                # ── Profile resolution (TECH DEBT) ──
                # This block duplicates ~30 lines from nfc_assign_spool_to_tray
                # (L1397-1503). The O6 decision in the spec called for
                # extracting this into script.nfc_resolve_push_params, but the
                # extraction was deferred for v1. After Layer 2 stabilizes,
                # consolidate into a single shared script. Until then: keep
                # ALL THREE copies in sync (assign script + SM_ONLY here +
                # CONFLICT below) if the resolution changes.
                - action: rest_command.spoolman_get_spool
                  data:
                    spool_id: "{{ _spool_id }}"
                  response_variable: spool
                  continue_on_error: true
                # If Spoolman GET succeeded, do the full heal. Otherwise
                # silently skip this row and let the next cycle retry — the
                # earlier `stop:` here was a blocker because stop: inside a
                # repeat exits the WHOLE script (no loop-scoped break in HA).
                - if:
                    - condition: template
                      value_template: "{{ spool is defined and spool.status | default(0) == 200 }}"
                  then:
                    - variables:
                        _material: "{{ spool.content.filament.material or 'PLA' }}"
                        _color_hex: "{{ (spool.content.filament.color_hex or 'FFFFFF') | upper }}"
                        _extruder_temp: "{{ (spool.content.filament.get('settings_extruder_temp') or 0) | float(0) }}"
                        _slug: "{{ (spool.content.filament.material or 'PLA') | lower | replace('-', '_') | replace('+', '_plus') }}"
                        _known_slugs: ['pla', 'pla_plus', 'pla_cf', 'petg', 'petg_cf', 'pa']
                        _tray_info_idx_map:
                          pla: GFL99
                          pla_plus: GFL99
                          pla_cf: GFL98
                          petg: GFG99
                          petg_cf: GFG98
                          pa: GFN99
                        _profile_idx: >-
                          {{ (spool.content.filament.extra | default({})).get('nfc_tray_idx', '')
                             | replace('"', '') | trim }}
                        _setting_idx: >-
                          {{ (spool.content.filament.extra | default({})).get('nfc_setting_id', '')
                             | replace('"', '') | trim }}
                        _harvested_min: "{{ (spool.content.filament.extra | default({})).get('nfc_temp_min', 0) | int(0) }}"
                        _harvested_max: "{{ (spool.content.filament.extra | default({})).get('nfc_temp_max', 0) | int(0) }}"
                    - variables:
                        _used_profile: "{{ _profile_idx not in ['', 'null', 'None'] }}"
                        _tray_info_idx: "{{ _profile_idx if _profile_idx not in ['', 'null', 'None'] else _tray_info_idx_map.get(_slug, 'GFL99') }}"
                        _nozzle_temp_min: >
                          {{ _harvested_min | int(0) if _harvested_min | int(0) > 0
                             else ((_extruder_temp - 10) | round | int if _extruder_temp > 0
                             else states('input_number.nfc_temp_min_' ~ (_slug if _slug in _known_slugs else 'default')) | float(190) | round | int) }}
                        _nozzle_temp_max: >
                          {{ _harvested_max | int(0) if _harvested_max | int(0) > 0
                             else ((_extruder_temp + 10) | round | int if _extruder_temp > 0
                             else states('input_number.nfc_temp_max_' ~ (_slug if _slug in _known_slugs else 'default')) | float(240) | round | int) }}
                        spool_name: "{{ spool.content.filament.name | default('spool #' ~ _spool_id) }}"
                    # ── Push to BB: BOTH endpoints required (v2.1 fix) ──
                    # Verified from BB docker logs 2026-06-16:
                    #   /slot-assignments (assign_slot) → STORES the row
                    #     in BB's DB (publishes EMPTY ams_filament_setting
                    #     MQTT — printer keeps existing profile)
                    #   /configure (configure_slot)     → PUSHES the full
                    #     profile via MQTT (does NOT store the row)
                    # v2 used /configure only; BB's /all never saw the row
                    # → next cycle saw SM_ONLY again → infinite heal loop.
                    # v2.1 calls BOTH: assign_slot first (so BB persists),
                    # then configure_slot (so printer gets the real profile).
                    # A1 evict-before-assign: clear any other BB rows for this
                    # spool first so the heal can't leave a duplicate behind
                    # (delete-by-spool removes all rows; assign re-creates one).
                    - action: rest_command.bambuddy_unassign_spool
                      data:
                        spool_id: "{{ _spool_id }}"
                      continue_on_error: true
                    - action: rest_command.bambuddy_assign_slot
                      data:
                        body: >-
                          {{ {'spoolman_spool_id': _spool_id | int(0),
                              'printer_id': states('input_number.spooltap_printer_id') | int(0),
                              'ams_id': _ams | int(0),
                              'tray_id': _tray | int(0)} | to_json }}
                      response_variable: assign_resp
                      continue_on_error: true
                    - if:
                        - condition: template
                          value_template: "{{ not (assign_resp is defined and assign_resp.status | default(0) in [200, 201]) }}"
                      then:
                        - action: input_text.set_value
                          target:
                            entity_id: input_text.nfc_register_status
                          data:
                            value: >-
                              ⚠ Reconciler: BB assign_slot failed for
                              {{ _slot }} ({{ spool_name }}, spool {{ _spool_id }}).
                              Skipping printer profile push — BB row would
                              not persist anyway.
                      else:
                        - action: rest_command.bambuddy_configure_slot
                          data:
                            printer_id: "{{ states('input_number.spooltap_printer_id') | int(0) }}"
                            ams_id: "{{ _ams | int(0) }}"
                            tray_id: "{{ _tray | int(0) }}"
                            tray_info_idx: "{{ _tray_info_idx }}"
                            tray_type: "{{ _material }}"
                            tray_color: "{{ _color_hex }}FF"
                            temp_min: "{{ _nozzle_temp_min }}"
                            temp_max: "{{ _nozzle_temp_max }}"
                            setting_id: "{{ _setting_idx if _used_profile else '' }}"
                          response_variable: configure_resp
                          continue_on_error: true
                        - if:
                            - condition: template
                              value_template: "{{ configure_resp is defined and configure_resp.status | default(0) in [200, 201] }}"
                          then:
                            - event: nfc_reconciler_heal
                              event_data:
                                direction: "SM→BB"
                                slot: "{{ _slot }}"
                                spool_id: "{{ _spool_id | int(0) }}"
                                spool_name: "{{ spool_name }}"
                                timestamp: "{{ now().isoformat() }}"
                          else:
                            # BB row persisted (assign_slot OK) but the
                            # printer profile push failed. Slot will be
                            # stable in BB but the printer may show stale
                            # or wrong filament_id. Surface so the user can
                            # re-scan or manually re-configure.
                            - action: input_text.set_value
                              target:
                                entity_id: input_text.nfc_register_status
                              data:
                                value: >-
                                  ⚠ Reconciler: BB row stored but
                                  configure_slot failed for {{ _slot }}
                                  ({{ spool_name }}, spool {{ _spool_id }}).
                                  Printer profile may be stale.
      # ── 9. Heal CONFLICTS: BB-wins (PATCH Spoolman + clear old) ──
      - repeat:
          for_each: "{{ conflict_keys }}"
          sequence:
            - variables:
                _key: "{{ repeat.item }}"
            - variables:
                _bb_row: "{{ bb_rows | selectattr('key', 'eq', _key) | first }}"
                _sm_row: "{{ sm_rows | selectattr('key', 'eq', _key) | first }}"
            - variables:
                _slot: "{{ _bb_row.slot }}"
                _bb_spool: "{{ _bb_row.spool_id }}"
                _sm_spool: "{{ _sm_row.spool_id }}"
            - if:
                - condition: template
                  value_template: "{{ _bb_spool | int(0) > 0 and _slot != '' }}"
              then:
                # Clear the displaced Spoolman spool's binding
                - action: rest_command.spoolman_get_spool
                  data:
                    spool_id: "{{ _sm_spool }}"
                  response_variable: old_spool
                  continue_on_error: true
                - if:
                    - condition: template
                      value_template: "{{ old_spool is defined and old_spool.status | default(0) == 200 }}"
                  then:
                    - variables:
                        old_extra: >-
                          {{ (old_spool.content.extra | default({}))
                             | combine({'nfc_active_tray': '""'}) }}
                    - action: rest_command.spoolman_patch_spool
                      data:
                        spool_id: "{{ _sm_spool }}"
                        body: "{{ {'extra': old_extra} | to_json }}"
                      continue_on_error: true
                # PATCH BB's spool with this slot
                - action: rest_command.spoolman_get_spool
                  data:
                    spool_id: "{{ _bb_spool }}"
                  response_variable: new_spool
                  continue_on_error: true
                - if:
                    - condition: template
                      value_template: "{{ new_spool is defined and new_spool.status | default(0) == 200 }}"
                  then:
                    - variables:
                        new_extra: >-
                          {{ (new_spool.content.extra | default({}))
                             | combine({'nfc_active_tray': '"' ~ _slot ~ '"'}) }}
                        spool_name: "{{ new_spool.content.filament.name | default('spool #' ~ _bb_spool) }}"
                    - action: rest_command.spoolman_patch_spool
                      data:
                        spool_id: "{{ _bb_spool }}"
                        body: "{{ {'extra': new_extra} | to_json }}"
                      response_variable: conflict_patch
                      continue_on_error: true
                    - if:
                        - condition: template
                          value_template: "{{ conflict_patch is defined and conflict_patch.status | default(0) == 200 }}"
                      then:
                        # ── Profile resolution + configure_slot push ──
                        # BB-wins means the printer should have BB's spool's
                        # profile, not whatever might have been there
                        # before. Inline-duplicated from Step 8 — TODO:
                        # consolidate via script.nfc_resolve_push_params.
                        - variables:
                            _material: "{{ new_spool.content.filament.material or 'PLA' }}"
                            _color_hex: "{{ (new_spool.content.filament.color_hex or 'FFFFFF') | upper }}"
                            _extruder_temp: "{{ (new_spool.content.filament.get('settings_extruder_temp') or 0) | float(0) }}"
                            _slug: "{{ (new_spool.content.filament.material or 'PLA') | lower | replace('-', '_') | replace('+', '_plus') }}"
                            _known_slugs: ['pla', 'pla_plus', 'pla_cf', 'petg', 'petg_cf', 'pa']
                            _tray_info_idx_map:
                              pla: GFL99
                              pla_plus: GFL99
                              pla_cf: GFL98
                              petg: GFG99
                              petg_cf: GFG98
                              pa: GFN99
                            _profile_idx: >-
                              {{ (new_spool.content.filament.extra | default({})).get('nfc_tray_idx', '')
                                 | replace('"', '') | trim }}
                            _setting_idx: >-
                              {{ (new_spool.content.filament.extra | default({})).get('nfc_setting_id', '')
                                 | replace('"', '') | trim }}
                            _harvested_min: "{{ (new_spool.content.filament.extra | default({})).get('nfc_temp_min', 0) | int(0) }}"
                            _harvested_max: "{{ (new_spool.content.filament.extra | default({})).get('nfc_temp_max', 0) | int(0) }}"
                        - variables:
                            _used_profile: "{{ _profile_idx not in ['', 'null', 'None'] }}"
                            _tray_info_idx: "{{ _profile_idx if _profile_idx not in ['', 'null', 'None'] else _tray_info_idx_map.get(_slug, 'GFL99') }}"
                            _nozzle_temp_min: >
                              {{ _harvested_min | int(0) if _harvested_min | int(0) > 0
                                 else ((_extruder_temp - 10) | round | int if _extruder_temp > 0
                                 else states('input_number.nfc_temp_min_' ~ (_slug if _slug in _known_slugs else 'default')) | float(190) | round | int) }}
                            _nozzle_temp_max: >
                              {{ _harvested_max | int(0) if _harvested_max | int(0) > 0
                                 else ((_extruder_temp + 10) | round | int if _extruder_temp > 0
                                 else states('input_number.nfc_temp_max_' ~ (_slug if _slug in _known_slugs else 'default')) | float(240) | round | int) }}
                        # ── BB write: BOTH endpoints (v2.1 fix) ──
                        # CONFLICT path mirrors the SM_ONLY fix at Step 8.
                        # See the comment block there for the full
                        # explanation of why both calls are required.
                        # In CONFLICT we're switching BB's row from
                        # _sm_spool to _bb_spool (wait — actually BB
                        # already has _bb_spool; we just need to ensure
                        # the row persists across BB's auto-eviction).
                        # A1 evict-before-assign: clear any other BB rows for
                        # the winning spool first (one-spool-one-slot).
                        - action: rest_command.bambuddy_unassign_spool
                          data:
                            spool_id: "{{ _bb_spool }}"
                          continue_on_error: true
                        - action: rest_command.bambuddy_assign_slot
                          data:
                            body: >-
                              {{ {'spoolman_spool_id': _bb_spool | int(0),
                                  'printer_id': states('input_number.spooltap_printer_id') | int(0),
                                  'ams_id': _bb_row.ams | int(0),
                                  'tray_id': _bb_row.tray | int(0)} | to_json }}
                          response_variable: assign_resp
                          continue_on_error: true
                        - if:
                            - condition: template
                              value_template: "{{ not (assign_resp is defined and assign_resp.status | default(0) in [200, 201]) }}"
                          then:
                            - action: input_text.set_value
                              target:
                                entity_id: input_text.nfc_register_status
                              data:
                                value: >-
                                  ⚠ Reconciler: BB assign_slot failed
                                  resolving conflict at {{ _slot }}
                                  ({{ spool_name }}, spool {{ _bb_spool }}).
                                  Skipping printer profile push.
                          else:
                            - action: rest_command.bambuddy_configure_slot
                              data:
                                printer_id: "{{ states('input_number.spooltap_printer_id') | int(0) }}"
                                ams_id: "{{ _bb_row.ams | int(0) }}"
                                tray_id: "{{ _bb_row.tray | int(0) }}"
                                tray_info_idx: "{{ _tray_info_idx }}"
                                tray_type: "{{ _material }}"
                                tray_color: "{{ _color_hex }}FF"
                                temp_min: "{{ _nozzle_temp_min }}"
                                temp_max: "{{ _nozzle_temp_max }}"
                                setting_id: "{{ _setting_idx if _used_profile else '' }}"
                              response_variable: configure_resp
                              continue_on_error: true
                            - if:
                                - condition: template
                                  value_template: "{{ configure_resp is defined and configure_resp.status | default(0) in [200, 201] }}"
                              then:
                                - event: nfc_reconciler_heal
                                  event_data:
                                    direction: "BB→SM (conflict, BB wins)"
                                    slot: "{{ _slot }}"
                                    spool_id: "{{ _bb_spool | int(0) }}"
                                    spool_name: "{{ spool_name }}"
                                    old_spool_id: "{{ _sm_spool | int(0) }}"
                                    timestamp: "{{ now().isoformat() }}"
                              else:
                                - action: input_text.set_value
                                  target:
                                    entity_id: input_text.nfc_register_status
                                  data:
                                    value: >-
                                      ⚠ Reconciler: BB row stored but
                                      configure_slot failed resolving
                                      conflict at {{ _slot }} ({{ spool_name }},
                                      spool {{ _bb_spool }}). Printer profile
                                      may be stale.
      # ── 10. Storm-counter reset on healthy cycle ──
      # If THIS cycle found no SM_ONLY rows, the per-key storm we were
      # tracking is gone — reset so a future, unrelated eviction
      # doesn't get instantly throttled by a stale counter from days ago.
      # (Reviewer-fix: blocker without this would permanently sticky
      # the dampener after a single resolved storm.)
      - if:
          - condition: template
            value_template: "{{ sm_only | length == 0 }}"
        then:
          - action: input_number.set_value
            target:
              entity_id: input_number.bb_reconciler_storm_count
            data:
              value: 0
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_storm_key
            data:
              value: ""
      # ── 11. Heal-summary status write (O7 opt-in phone notify) ──
      # Aggregate total heals this cycle. If non-zero AND the opt-in
      # boolean is on, write a status string the nfc_status_notify
      # automation will mirror to the phone. Silent otherwise; the
      # heal-log sensor + Inventory dashboard card always capture it
      # for visual review regardless of the notify boolean.
      - variables:
          total_heals: "{{ (bb_only | length) + (sm_only | length) + (conflict_keys | length) }}"
      - if:
          - condition: template
            value_template: >-
              {{ total_heals | int(0) > 0
                 and is_state('input_boolean.nfc_notify_reconcile', 'on') }}
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >-
                BB Reconciler healed {{ total_heals }} Slot(s) at {{ now().strftime('%H:%M') }}.
      # ── 12. Recovery acknowledgement ──
      # If we just succeeded after >0 prior fails, surface a one-shot
      # "recovered" status so the ⚠ doesn't linger. Then reset fail_count.
      - if:
          - condition: numeric_state
            entity_id: input_number.bb_reconciler_fail_count
            above: 0
        then:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >-
                BB Reconciler OK — recovered after {{ states('input_number.bb_reconciler_fail_count') }} failed cycle(s).
          - action: input_number.set_value
            target:
              entity_id: input_number.bb_reconciler_fail_count
            data:
              value: 0

automation:
  # Capture every NFC scan into nfc_last_scanned. (Android device_id is
  # unreliable, so we key off tag_id only.)
  - id: nfc_capture_scanned_tag
    alias: "NFC: Capture scanned Tag"
    mode: queued
    triggers:
      - trigger: event
        event_type: tag_scanned
    actions:
      # D1 (modify-remediation 55deaac): clear-to-"" before set forces a
      # state_changed event on every physical scan, even when the user
      # rescans the same tag they just bound. Without this, dispatch
      # never fires because input_text.set_value with the same value
      # emits no state_changed. Dispatch's not_to: [""] guard suppresses
      # the intermediate. Mirrors the proven pattern in
      # nfc_empty_slot_queue_watcher (L3833-3842).
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_last_scanned
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_last_scanned
        data:
          value: "{{ trigger.event.data.tag_id }}"
      # In Registration Mode the dispatch below is deliberately disabled, so
      # without this a scan produced NO feedback at all (discovered live
      # 2026-06-11: user scanned a tag and had no way to know HA saw it).
      # Confirm receipt and say what to do next. (Outside Registration Mode
      # the dispatch automation writes the status instead.)
      - if:
          - condition: state
            entity_id: input_boolean.nfc_register_mode
            state: "on"
        then:
          # Timestamp makes every scan produce a CHANGED status (and thus a
          # fresh phone notification) even when the same tag is re-scanned —
          # otherwise an identical status string would be silently dropped.
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: >-
                [{{ now().strftime('%H:%M:%S') }}] Tag scanned:
                {{ trigger.event.data.tag_id }} — set **Bind: Target Spool ID** and tap
                **Bind Tag to Spool**, or pick an **AMS Slot** and tap **Bind Tag to
                Slot**

  # Mirror every workflow status update to the phone as a notification.
  # The dashboard status card is easy to miss while physically tapping tags
  # — this puts positive confirmation of every scan/bind/assign/error on
  # the device in hand. The notification `tag` makes each update REPLACE
  # the previous one (no stacking); `channel` gives it its own Android
  # notification channel so it can be tuned/muted independently.
  - id: nfc_status_notify
    alias: "NFC: Push Status to phone"
    mode: queued
    triggers:
      - trigger: state
        entity_id: input_text.nfc_register_status
        not_to:
          - ""
          - "unknown"
          - "unavailable"
    # Per-category notification gates (see the "Notifications" dashboard
    # view). The status text is classified by prefix/content and only pushed
    # if the matching nfc_notify_* toggle is on. The dashboard Status card
    # always shows every message regardless — these gate the PHONE pushes.
    conditions:
      - condition: template
        value_template: >-
          {%- set msg = states('input_text.nfc_register_status') -%}
          {%- if '⚠' in msg -%}
            {{ is_state('input_boolean.nfc_notify_error', 'on') }}
          {%- elif 'Tag scanned' in msg -%}
            {{ is_state('input_boolean.nfc_notify_scan', 'on') }}
          {%- elif msg.startswith('Bound Tag') -%}
            {{ is_state('input_boolean.nfc_notify_bind', 'on') }}
          {%- elif msg.startswith('AMS Slot') -%}
            {{ is_state('input_boolean.nfc_notify_slot_prompt', 'on') }}
          {%- elif msg.startswith('Assigned Spool') -%}
            {{ is_state('input_boolean.nfc_notify_assign', 'on') }}
          {%- elif msg.startswith('NOT bound') or msg.startswith('Unrecognized')
                or 'ARCHIVED' in msg or 'not in HA' in msg -%}
            {{ is_state('input_boolean.nfc_notify_error', 'on') }}
          {%- elif msg.startswith('BB Reconciler healed')
                or msg.startswith('BB Reconciler OK') -%}
            {{ is_state('input_boolean.nfc_notify_reconcile', 'on') }}
          {%- elif msg.startswith('Updated Spool')
                or (msg.startswith('Spool #') and 'remaining' in msg) -%}
            {{ is_state('input_boolean.nfc_notify_weight', 'on') }}
          {%- elif msg.startswith('Opened Spool') or msg.startswith('Weigh-In')
                or msg.startswith('Updated Filament') or msg.startswith('Archived Spool')
                or msg.startswith('Tag \'') -%}
            {{ is_state('input_boolean.nfc_notify_modify', 'on') }}
          {%- elif 'timed out' in msg -%}
            {{ is_state('input_boolean.nfc_notify_timeout', 'on') }}
          {%- else -%}
            {{ is_state('input_boolean.nfc_notify_other', 'on') }}
          {%- endif -%}
    actions:
      - action: "{{ states('input_text.spooltap_notify_target') }}"
        data:
          title: "SpoolTap"
          message: "{{ states('input_text.nfc_register_status') }}"
          data:
            tag: nfc_status
            channel: "SpoolTap"

  # Scan dispatch (Phase A + Phase B). Routes a scan four ways:
  #  1. slot tag            -> arm input_text.nfc_pending_slot
  #  2. spool tag + pending  -> nfc_assign_spool_to_tray (Phase A)
  #  3. spool tag, no pending -> nfc_lookup_spool (Phase B weight)
  #  4. no match             -> nfc_resolve_unmatched (archived/unregistered)
  # Skipped while registration mode is on (Phase 1 binding owns the scanner).
  # NOTE: alias unchanged to preserve the runtime entity_id
  # (automation.nfc_phase_a_dispatch_slot_spool_scan_routing).
  - id: nfc_phase_a_dispatch
    alias: "NFC: Scan dispatch (Slot/Spool routing)"
    mode: queued
    triggers:
      - trigger: state
        entity_id: input_text.nfc_last_scanned
        not_to:
          - ""
          - "unknown"
          - "unavailable"
    conditions:
      - condition: state
        entity_id: input_boolean.nfc_register_mode
        state: "off"
    variables:
      tag: "{{ states('input_text.nfc_last_scanned') }}"
      slot_match: >-
        {%- set ns = namespace(found='') -%}
        {%- for slot in ['left_1','left_2','left_3','left_4','right_1','right_2','right_3','right_4','external'] -%}
          {%- if states('input_text.nfc_slot_' ~ slot) == tag -%}
            {%- set ns.found = slot -%}
          {%- endif -%}
        {%- endfor -%}
        {{- ns.found -}}
      spool_match: >-
        {%- set ns = namespace(found='') -%}
        {%- for s in states.sensor
             | selectattr('entity_id', 'search', '_extra_nfc_tag$')
             | selectattr('state', 'eq', tag) -%}
          {%- set ns.found = s.object_id.split('_')[2] -%}
        {%- endfor -%}
        {{- ns.found -}}
    actions:
      - choose:
          - conditions:
              - "{{ slot_match != '' }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_pending_slot
                data:
                  value: "{{ slot_match }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.nfc_register_status
                data:
                  value: >-
                    {%- set s = slot_match -%}
                    {%- set slot_disp = 'External' if s == 'external'
                        else ('Left ' ~ s[-1] if s.startswith('left_')
                        else ('Right ' ~ s[-1] if s.startswith('right_')
                        else (s | replace('_', ' ') | title))) -%}
                    AMS Slot {{ slot_disp }} scanned — now scan a Spool Tag to Assign
          - conditions:
              - >
                {{ spool_match != ''
                   and states('input_text.nfc_pending_slot') not in ['', 'unknown', 'unavailable'] }}
            sequence:
              # turn_on = fire-and-forget: the dispatch automation must
              # never block behind the assign script's push retries, or
              # queued scans pile up behind a busy AMS.
              - action: script.turn_on
                target:
                  entity_id: script.nfc_assign_spool_to_tray
          # ── Modify-redesign D1 ────────────────────────────────────
          # Modify-tab scan-to-load: bypasses script.nfc_lookup_spool
          # (which is mode: single and silently drops a rapid second scan
          # mid-Spoolman-GET — Pain point #1 / UC9). Routes straight to
          # script.nfc_load_spool_for_modify (mode: restart) so a second
          # tag scan correctly cancels an in-progress load and reloads
          # the panel with the new spool (Q4A "silently switch").
          #
          # Uses the automation's `spool_match` variable, which is set
          # ONCE from input_text.nfc_last_scanned in the variables block
          # at trigger time — atomic snapshot, immune to nfc_last_scanned
          # changing mid-action (the spec's R2 race concern).
          - conditions:
              - "{{ states('input_select.spooltap_mode') == 'Modify' }}"
              - "{{ spool_match != '' }}"
              - "{{ states('input_text.nfc_pending_slot') in ['', 'unknown', 'unavailable'] }}"
            sequence:
              - action: script.nfc_load_spool_for_modify
                data:
                  spool_id: "{{ spool_match | int(0) }}"
          # Phase B: a registered spool scanned with no slot pending -> weight.
          - conditions:
              - >
                {{ spool_match != ''
                   and states('input_text.nfc_pending_slot') in ['', 'unknown', 'unavailable'] }}
            sequence:
              - action: script.nfc_lookup_spool
        # No slot/active-spool match -> classify (archived vs unregistered).
        default:
          - action: script.nfc_resolve_unmatched

  # Empty-Slot Queue Watcher: fires the deferred assignment when filament
  # is physically loaded into a slot that was tapped while empty.
  #
  # Flow: user taps spool tag to an empty AMS slot ->
  # nfc_assign_spool_to_tray runs RECORDS (Bambuddy + Spoolman), detects
  # the empty tray, writes "slot|tag_uid|epoch" to nfc_queued_assign, and
  # stops. The 2-min freeze is gone. The user then loads filament. The
  # corresponding tray sensor flips away from "Empty". This watcher fires,
  # waits 8s for the AMS feed/detect cycle to settle (ghost-load defense),
  # re-checks the tray is still loaded and the queue is still set
  # (cancel defense), restores the scan helpers in safe order, and clears
  # the queue. Phase A dispatch sees the nfc_last_scanned change, re-enters
  # nfc_assign_spool_to_tray (mode:restart). The records phase runs again
  # idempotently; the empty-check now passes (tray is loaded) and the
  # printer push proceeds normally.
  #
  # External spool is excluded: its "Empty" state is profile-derived, not
  # physical detection — the configure push is what fixes it, no deferral
  # needed. The existing in-script Stage-2 path handles external slots.
  - id: nfc_empty_slot_queue_watcher
    alias: "NFC: Queue → fire deferred Assign on AMS load"
    mode: queued
    max: 2
    triggers:
      # TOPOLOGY (install-specific, NOT parameterizable): HA requires static
      # trigger entity_ids, so these can't read secrets.yaml. Match them to
      # your AMS trays — your spooltap_ams_prefix + left_tray_1..4 /
      # right_tray_1..4. Single AMS: delete the right_* lines.
      - trigger: state
        entity_id:
          - sensor.YOURPRINTER_ams_..._left_tray_1
          - sensor.YOURPRINTER_ams_..._left_tray_2
          - sensor.YOURPRINTER_ams_..._left_tray_3
          - sensor.YOURPRINTER_ams_..._left_tray_4
          - sensor.YOURPRINTER_ams_..._right_tray_1
          - sensor.YOURPRINTER_ams_..._right_tray_2
          - sensor.YOURPRINTER_ams_..._right_tray_3
          - sensor.YOURPRINTER_ams_..._right_tray_4
        from: "Empty"
        not_to:
          - "Empty"
          - "unknown"
          - "unavailable"
    conditions:
      # Queue holds something
      - condition: template
        value_template: >-
          {{ states('input_text.nfc_queued_assign') not in ['', 'unknown', 'unavailable'] }}
      # The slot that just loaded matches the queued slot. Slot label is
      # derived from the tray sensor entity_id by stripping the device
      # prefix and the literal "tray_" → "left_3" etc.
      - condition: template
        value_template: >-
          {%- set q = states('input_text.nfc_queued_assign').split('|') -%}
          {%- set queued_slot = q[0] if q | length >= 1 else '' -%}
          {%- set fired_slot = trigger.entity_id
                | replace(states('input_text.spooltap_ams_prefix'), '')
                | replace('_tray_', '_') -%}
          {{ queued_slot == fired_slot }}
      # Freshness: queue entry no older than 1 hour (3600 s). Stale entries
      # silently fail-closed; the user can re-scan when they're ready.
      - condition: template
        value_template: >-
          {%- set q = states('input_text.nfc_queued_assign').split('|') -%}
          {%- set epoch = (q[2] if q | length >= 3 else '0') | int(0) -%}
          {{ epoch > 0 and (now().timestamp() | int - epoch) < 3600 }}
      # Not actively printing — same gate as the queue-write path.
      - condition: template
        value_template: >-
          {{ states(states('input_text.spooltap_print_status_sensor'))
             not in ['running', 'prepare', 'slicing', 'pause'] }}
      # Not in registration mode — Phase A dispatch is disabled during
      # registration; dequeueing into a disabled dispatcher would clobber
      # helpers without firing the assign script.
      - condition: state
        entity_id: input_boolean.nfc_register_mode
        state: "off"
      # No in-flight scan-pair — pending_slot non-empty means the user is
      # mid-scan; clobbering their helpers would derail their flow.
      - condition: template
        value_template: >-
          {{ states('input_text.nfc_pending_slot') in ['', 'unknown', 'unavailable'] }}
    # TOCTOU defense: conditions: above guarantee the queue is non-empty
    # AT TRIGGER TIME, but cancel can fire between conditions and variables
    # (or the helper can be 'unknown' during HA startup). A bare [1] index
    # on a 1-element split would IndexError silently → automation aborts
    # after writing pending_slot. Length-guard everything; the post-delay
    # re-check at the top of actions: catches the cleared-mid-flight case.
    variables:
      queued_slot: >-
        {%- set _q = states('input_text.nfc_queued_assign').split('|') -%}
        {{- _q[0] if _q | length >= 1 else '' -}}
      queued_tag_uid: >-
        {%- set _q = states('input_text.nfc_queued_assign').split('|') -%}
        {{- _q[1] if _q | length >= 2 else '' -}}
    actions:
      # Settle for 8 s so the AMS feed/detect cycle completes. Reacting
      # immediately on the first non-Empty state risks pushing during the
      # brief mid-feed window (ghost-load), and the AMS can also briefly
      # transition Empty -> material -> Empty during a misfeed.
      - delay: "00:00:08"
      # Re-check the tray is STILL loaded (ghost-load defense).
      - condition: template
        value_template: "{{ not is_state(trigger.entity_id, 'Empty') }}"
      # Re-check the queue is STILL set (user may have cancelled or
      # re-queued during the settle window).
      - condition: template
        value_template: >-
          {{ states('input_text.nfc_queued_assign') not in ['', 'unknown', 'unavailable'] }}
      # Re-check still not printing (a print could have started during
      # the 8 s settle — vanishingly unlikely, but the guard is cheap).
      - condition: template
        value_template: >-
          {{ states(states('input_text.spooltap_print_status_sensor'))
             not in ['running', 'prepare', 'slicing', 'pause'] }}
      # Status update so the user sees the dequeue happen.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: >-
            {%- set s = queued_slot -%}
            {%- set queued_slot_disp = 'External' if s == 'external'
                else ('Left ' ~ s[-1] if s.startswith('left_')
                else ('Right ' ~ s[-1] if s.startswith('right_')
                else (s | replace('_', ' ') | title))) -%}
            Filament detected in AMS {{ queued_slot_disp }} — running queued Assignment now…
      # Restore the scan helpers in safe order: pending_slot FIRST so it's
      # already populated when the Phase A dispatch trigger fires on the
      # last_scanned change. (HA processes service calls in sequence; the
      # state_changed event from action #1 propagates before action #2
      # runs, so dispatch sees both updated values.)
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_pending_slot
        data:
          value: "{{ queued_slot }}"
      # Force a state change on nfc_last_scanned: the queued tag UID is
      # very often EQUAL to the current value (the original tap set it
      # when the queue was written). Re-setting an input_text to its
      # own current value emits NO state_changed event, so the Phase A
      # dispatch trigger would never fire and the dequeued assign would
      # silently no-op (live-verified 2026-06-15: watcher ran perfectly
      # but never triggered the script). Clear to "" first — that emits
      # a state change AND is excluded from dispatch's trigger via
      # not_to, so dispatch only fires on the real value below.
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_last_scanned
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_last_scanned
        data:
          value: "{{ queued_tag_uid }}"
      # Intent has been dequeued. Clear it so a follow-up tap-and-load is
      # a fresh cycle (and the chip transitions Queued -> Working cleanly).
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_queued_assign
        data:
          value: ""

  # Keep the faceted spool-picker dropdowns in sync: on startup (runtime
  # set_options do NOT survive a restart — options revert to the YAML
  # placeholders) and whenever a filter/pool selection changes. The not_to
  # filter makes these value-change triggers, so the set_options attribute
  # updates this automation itself causes don't re-trigger it; a rebuild
  # that invalidates a selection resets it to "Any" (a value change), which
  # triggers one more converging, idempotent pass.
  - id: nfc_filter_rebuild
    alias: "NFC: Rebuild Spool Picker (Bind, startup/filter)"
    mode: queued
    max: 5
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_select.nfc_filter_brand
          - input_select.nfc_filter_type
          - input_select.nfc_pool_mode
        not_to:
          - "unknown"
          - "unavailable"
      # SELF-HEAL: any input_select reload wipes runtime options back to
      # the YAML placeholder, leaving single-option dropdowns that can
      # never fire the filter-change trigger above (live deadlock
      # 2026-06-12: an unrelated select reload emptied the pickers until
      # manually rebuilt). When the pick list collapses to its
      # placeholder, rebuild immediately. No loop: a successful rebuild
      # yields a long options list, which fails the condition.
      - trigger: state
        entity_id: input_select.nfc_spool_pick
        attribute: options
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.platform != 'state'
             or trigger.entity_id != 'input_select.nfc_spool_pick'
             or (state_attr('input_select.nfc_spool_pick', 'options') | default([]) | count) <= 1 }}
    actions:
      - action: script.nfc_rebuild_spool_filters

  # Modify Spool picker: same rebuild-on-startup/filter-change contract as
  # the bind picker (runtime set_options don't survive restarts).
  - id: nfc_modify_filter_rebuild
    alias: "NFC: Rebuild Spool Picker (Modify, startup/filter)"
    mode: queued
    max: 5
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id:
          - input_select.nfc_mod_filter_brand
          - input_select.nfc_mod_filter_type
        not_to:
          - "unknown"
          - "unavailable"
      # SELF-HEAL after input_select reloads (see nfc_filter_rebuild).
      - trigger: state
        entity_id: input_select.nfc_mod_spool_pick
        attribute: options
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.platform != 'state'
             or trigger.entity_id != 'input_select.nfc_mod_spool_pick'
             or (state_attr('input_select.nfc_mod_spool_pick', 'options') | default([]) | count) <= 1 }}
    actions:
      - action: script.nfc_rebuild_modify_filters

  # Auto-load on pick: choosing a spool in the Modify list loads it
  # immediately (no extra Load button). Rebuild resets land on "Select…",
  # which is excluded by not_to.
  - id: nfc_modify_pick_load
    alias: "NFC: Open Spool on Modify pick"
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_select.nfc_mod_spool_pick
        not_to:
          - "Select…"
          - ""
          - "unknown"
          - "unavailable"
    conditions:
      - condition: template
        value_template: "{{ states('input_select.nfc_mod_spool_pick').startswith('#') }}"
    actions:
      - action: script.nfc_load_spool_for_modify
        data:
          spool_id: "{{ states('input_select.nfc_mod_spool_pick') | regex_findall('^#(\\d+)') | first | default(0) }}"

  # Auto-load on tag choice: at inventory time the tag sticker ("Spool 07")
  # is the most visible identifier on a physical spool — picking it loads
  # that spool directly. Resets itself back to the "Select Spool Tag…"
  # placeholder afterwards so the same tag can be re-picked later (state must
  # change to re-trigger).
  - id: nfc_modify_tag_load
    alias: "NFC: Open Spool on Modify Tag pick"
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_select.nfc_mod_tag
        not_to:
          - "Select Spool Tag…"
          - ""
          - "unknown"
          - "unavailable"
    actions:
      - variables:
          tag_id: >-
            {{ states.tag | selectattr('name', 'eq', states('input_select.nfc_mod_tag'))
               | map(attribute='attributes.tag_id') | first | default('') }}
          sid: >-
            {%- set ns = namespace(found=0) -%}
            {%- for s in states.sensor | selectattr('entity_id', 'search', 'spoolman_spool_[0-9]+$')
                 | selectattr('attributes.extra_nfc_tag', 'defined')
                 | selectattr('attributes.extra_nfc_tag', 'eq', tag_id) -%}
              {%- set ns.found = s.attributes.id | int(0) -%}
            {%- endfor -%}
            {{- ns.found -}}
      - if:
          - condition: template
            value_template: "{{ sid | int(0) > 0 }}"
        then:
          - action: script.nfc_load_spool_for_modify
            data:
              spool_id: "{{ sid }}"
        else:
          - action: input_text.set_value
            target:
              entity_id: input_text.nfc_register_status
            data:
              value: "Tag '{{ states('input_select.nfc_mod_tag') }}' is not bound to any active Spool."
      - action: input_select.select_option
        target:
          entity_id: input_select.nfc_mod_tag
        data:
          option: "Select Spool Tag…"

  # Clear a stale pending-slot scan if no spool tag follows within 5 minutes.
  - id: nfc_pending_slot_timeout
    alias: "NFC: Clear Pending Slot after timeout"
    mode: restart
    triggers:
      - trigger: state
        entity_id: input_text.nfc_pending_slot
        not_to:
          - ""
        for:
          minutes: 5
    actions:
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_pending_slot
        data:
          value: ""
      - action: input_text.set_value
        target:
          entity_id: input_text.nfc_register_status
        data:
          value: "Pending Slot scan timed out (cleared after 5 min)"

  # Keep filament->profile mappings current without user effort: any
  # filament newly added to Spoolman gets matched against the cloud library
  # nightly. The dashboard "Sync Filament Profiles" button covers the
  # impatient path right after adding one.
  - id: nfc_profile_sync_daily
    alias: "NFC: Daily Filament Profile sync"
    mode: single
    triggers:
      - trigger: time
        at: "03:30:00"
    actions:
      - action: script.nfc_sync_filament_profiles

  # Dashboard QoL: Registration Mode only makes sense while binding (it
  # gates the scan dispatch — Phase A is skipped while it's on). When the
  # SpoolTap dashboard mode switches AWAY from Bind, force it off so a
  # left-on toggle can never silently block assigns in another mode.
  - id: nfc_regmode_autooff_leaving_bind
    alias: "NFC: Auto-off Bind Mode when leaving Bind tab"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_select.spooltap_mode
    conditions:
      - condition: template
        value_template: "{{ not is_state('input_select.spooltap_mode','Bind') }}"
      - condition: state
        entity_id: input_boolean.nfc_register_mode
        state: "on"
    actions:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.nfc_register_mode

  # ═════════════════════════════════════════════════════════════
  # BB Reconciler triggers — four ways to fire script.bb_reconciler_cycle
  # ═════════════════════════════════════════════════════════════
  # All four gate on input_boolean.bb_reconciler_enabled EXCEPT the
  # manual button (which is explicit user intent to run regardless).

  # 1. Steady-state poll: every 5 min the safety-net cycle fires.
  # Catches the "BB evicted silently, no tray sensor change observed"
  # case (the actual original-bug scenario). 5 min sits comfortably
  # inside the user's 8-10 min minimum print window so any unprinted-but-
  # soon-printed slot heals before deduct kicks in.
  - id: nfc_bb_reconciler_poll
    alias: "BB Reconciler: 5-min poll"
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/5"
    conditions:
      - condition: state
        entity_id: input_boolean.bb_reconciler_enabled
        state: "on"
    actions:
      - action: script.bb_reconciler_cycle

  # 2. Event-driven: AMS tray sensors transitioning can signal BB has
  # evicted a row. 30s delay lets the printer's MQTT chatter settle
  # so we don't reconcile in the middle of a multi-update burst.
  # External slot excluded (no real tray detection there).
  - id: nfc_bb_reconciler_event
    alias: "BB Reconciler: slot-change kicker"
    mode: queued
    max: 2
    triggers:
      # TOPOLOGY (install-specific, NOT parameterizable): HA requires static
      # trigger entity_ids, so these can't read secrets.yaml. Match them to
      # your AMS trays — your spooltap_ams_prefix + left_tray_1..4 /
      # right_tray_1..4. Single AMS: delete the right_* lines.
      - trigger: state
        entity_id:
          - sensor.YOURPRINTER_ams_..._left_tray_1
          - sensor.YOURPRINTER_ams_..._left_tray_2
          - sensor.YOURPRINTER_ams_..._left_tray_3
          - sensor.YOURPRINTER_ams_..._left_tray_4
          - sensor.YOURPRINTER_ams_..._right_tray_1
          - sensor.YOURPRINTER_ams_..._right_tray_2
          - sensor.YOURPRINTER_ams_..._right_tray_3
          - sensor.YOURPRINTER_ams_..._right_tray_4
        not_to:
          - "unknown"
          - "unavailable"
    conditions:
      - condition: state
        entity_id: input_boolean.bb_reconciler_enabled
        state: "on"
    actions:
      - delay: "00:00:30"
      - action: script.bb_reconciler_cycle

  # 3. Startup sync: 90s after HA boots, run one cycle so any BB
  # eviction that occurred during the restart window heals before the
  # first user interaction. Silent on no-diff per O4 (no boot
  # heartbeat — Layer-1 silent-until-broken aesthetic).
  - id: nfc_bb_reconciler_startup
    alias: "BB Reconciler: startup sync"
    mode: single
    triggers:
      - trigger: homeassistant
        event: start
    conditions:
      - condition: state
        entity_id: input_boolean.bb_reconciler_enabled
        state: "on"
    actions:
      - delay: "00:01:30"
      - action: script.bb_reconciler_cycle

  # 4. Manual button: user-initiated reconcile-now. Bypasses the
  # master switch — the user tapping the button is unambiguous intent
  # to run a cycle regardless of any boolean state.
  - id: nfc_bb_reconciler_manual
    alias: "BB Reconciler: manual run-now"
    mode: single
    triggers:
      - trigger: state
        entity_id: input_button.nfc_reconcile_now
    actions:
      - action: script.bb_reconciler_cycle
